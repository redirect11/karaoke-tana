# requirements/requirements.yaml
#
# Requisiti funzionali strutturati — Karaoke Tana Test
#
# Formato:
#   id:          Identificatore stabile (es. REQ-FOLLOW-001)
#   title:       Titolo breve
#   area:        Area del codice (file o modulo)
#   description: Descrizione del requisito
#   status:      implemented | partial | todo | deprecated
#   generate_issue: true se si vuole creare automaticamente un'issue GitHub
#                   (utile per requisiti nuovi o da implementare)
#   labels:      Lista di label GitHub da applicare all'issue
#   test_cases:  Lista di ID test case associati
#
# Per generare issue GitHub da questo file:
#   node scripts/generate-issues.mjs
#
# Oppure, tramite workflow:
#   GitHub → Actions → "Generate Issues from Requirements" → Run workflow

requirements:

  # ── Follow Flow ──────────────────────────────────────────────────────────────

  - id: REQ-FOLLOW-001
    title: "Box Segui: sempre visibile se ig_followed non impostato"
    area: "index.html init, scripts/follow-flow.js"
    description: >
      Il box "Segui" deve essere mostrato sempre al caricamento della pagina se il
      cookie ig_followed non è impostato a "true". Nessun altro cookie (es. ig_clicked)
      deve bypassare questo comportamento.
    status: implemented
    generate_issue: false
    labels: [follow-flow, ui]
    test_cases: [TC-FOLLOW-001, TC-FOLLOW-002]

  - id: REQ-FOLLOW-002
    title: "Widget step: visibile al primo accesso senza follow"
    area: "index.html init, scripts/follow-flow.js"
    description: >
      Al primo accesso o al ricaricamento senza follow, devono essere visibili il
      widget degli step (.steps), il box Segui (#step-follow) con lo step 1 attivo.
    status: implemented
    generate_issue: false
    labels: [follow-flow, ui]
    test_cases: [TC-FOLLOW-001]

  - id: REQ-FOLLOW-003
    title: "Segui cliccato senza ricaricamento: form visibile, step 2 attivo"
    area: "index.html → goToForm()"
    description: >
      Quando l'utente clicca "Segui" e ritorna alla pagina senza ricaricare,
      il box Segui scompare, il form di prenotazione appare, il widget step
      resta visibile con lo step 1 completato e lo step 2 attivo.
    status: implemented
    generate_issue: false
    labels: [follow-flow, ui]
    test_cases: [TC-FOLLOW-003]

  - id: REQ-FOLLOW-004
    title: "Ricaricamento con follow già completato: no box Segui, no widget step"
    area: "index.html init"
    description: >
      Se ig_followed=true è presente al caricamento, il box Segui non viene mostrato,
      il widget step non viene mostrato, e si passa direttamente al form di prenotazione,
      salvo stati prioritari.
    status: implemented
    generate_issue: false
    labels: [follow-flow, ui]
    test_cases: [TC-FOLLOW-004]

  - id: REQ-FOLLOW-005
    title: "Nessuna riapparizione del box Segui dopo follow via realtime/polling"
    area: "index.html → refreshSerataState, handleNewSerataOpened, handleReturn"
    description: >
      Dopo che il follow è stato completato (ig_followed=true al load o
      followedInSession=true), gli eventi successivi (realtime, polling 8s, focus,
      visibilitychange, pageshow) non devono far riapparire il box Segui né il widget
      step. handleReturn procede a goToForm() solo se igOpened=true.
    status: implemented
    generate_issue: false
    labels: [follow-flow, ui, realtime]
    test_cases: [TC-FOLLOW-005, TC-FOLLOW-006]

  # ── Step Widget ──────────────────────────────────────────────────────────────

  - id: REQ-STEP-001
    title: "Widget step: elemento statico, decisione al load"
    area: "index.html init, scripts/follow-flow.js"
    description: >
      La visibilità del widget degli step viene decisa una sola volta al caricamento,
      in modo deterministico, tramite computeFollowFlowVisibility. Gli eventi
      successivi non modificano questa decisione se l'utente è già in un flusso
      di prenotazione attivo.
    status: implemented
    generate_issue: false
    labels: [step-widget, ui]
    test_cases: []

  - id: REQ-STEP-002
    title: "Nessun flicker al ricaricamento"
    area: "index.html (HTML statico: style=display:none)"
    description: >
      Gli elementi .steps, #step-follow, #step-form partono con style="display:none"
      nell'HTML. Solo il loader #step-loading è visibile inizialmente. Questo impedisce
      qualsiasi flash/flicker durante il caricamento.
    status: implemented
    generate_issue: false
    labels: [step-widget, ui]
    test_cases: []

  # ── CI/CD ────────────────────────────────────────────────────────────────────

  - id: REQ-CI-001
    title: "Deploy GitHub Pages solo se i test sono verdi"
    area: ".github/workflows/deploy.yml"
    description: >
      Il deploy su GitHub Pages e le operazioni di migrazione DB / deploy edge
      functions non devono avvenire se la suite di test fallisce.
      Pipeline: test → migrate → deploy-functions → deploy (Pages).
    status: implemented
    generate_issue: false
    labels: [ci-cd, deploy]
    test_cases: []

  - id: REQ-CI-002
    title: "Pipeline coerente: migrate prima di deploy-functions"
    area: ".github/workflows/deploy.yml"
    description: >
      Le migrazioni database devono essere eseguite prima del deploy delle edge
      functions, che devono completarsi prima del deploy Pages.
    status: implemented
    generate_issue: false
    labels: [ci-cd, deploy]
    test_cases: []

  # ── Stati Prioritari ─────────────────────────────────────────────────────────

  - id: REQ-PRIORITY-001
    title: "Gli stati prioritari prevalgono sul follow flow"
    area: "index.html, scripts/karaoke-state.js"
    description: >
      I seguenti stati hanno la precedenza assoluta: pending booking, waiting,
      success, bookings disabled, reveal mode, closed state. Devono essere
      mostrati anche se ig_followed=true.
    status: implemented
    generate_issue: false
    labels: [priority-states, ui]
    test_cases: []

  # ── Gestione stato pre-live ───────────────────────────────────────────────────

  - id: REQ-QUEUE-001
    title: "Setting post-approvazione configurabile"
    area: "admin-tools.html, supabase/functions/admin-bookings/index.ts, impostazioni_pubbliche"
    description: >
      Nelle impostazioni deve essere presente il controllo "Cosa fare dopo approvazione"
      con due scelte: "La canzone va direttamente live" oppure "In preparazione e poi live".
      La UI deve mostrare anche una descrizione chiara del comportamento di entrambe.
    status: implemented
    generate_issue: false
    labels: [queue, settings, admin]
    test_cases: [TC-QUEUE-001]

  - id: REQ-QUEUE-002
    title: "Stato transitorio 'si sta preparando' prima del live"
    area: "admin.html, index.html, scripts/karaoke-state.js, prenotazioni"
    description: >
      Quando il setting post-approvazione è impostato su "In preparazione e poi live",
      la canzone corrente deve entrare nello stato "si sta preparando" prima del live.
      In home e nella lista pubblica questo stato deve essere visibile; in admin la canzone
      corrente deve mostrare il pulsante "Inizia" e solo dopo il click passare al normale
      stato live/on air.
    status: implemented
    generate_issue: false
    labels: [queue, ui, admin]
    test_cases: [TC-QUEUE-002, TC-QUEUE-003]

  # ── Reveal vincitore ────────────────────────────────────────────────────────

  - id: REQ-REVEAL-001
    title: "Reveal classifica finale opzionale dopo countdown"
    area: "admin-tools.html, admin.html, vota.html, admin-bookings"
    description: >
      Deve esistere un'impostazione per attivare/disattivare il reveal progressivo
      della Top 5 dopo il countdown di proclamazione. Se disattivato, al termine del
      countdown viene mostrata subito la classifica finale completa.
    status: implemented
    generate_issue: false
    labels: [winner-reveal, settings, ui]
    test_cases: [TC-REVEAL-001]

  - id: REQ-REVEAL-002
    title: "Reveal manuale gestito da admin"
    area: "admin.html, vota.html, admin-bookings"
    description: >
      Con reveal attivo in modalità manuale, al termine del countdown viene mostrata
      subito la posizione più bassa della Top 5 (o equivalente se meno elementi),
      e l'admin svela le posizioni successive con un controllo dinamico fino al
      pulsante finale "Svela vincitore".
    status: implemented
    generate_issue: false
    labels: [winner-reveal, admin, control]
    test_cases: [TC-REVEAL-002]

  - id: REQ-REVEAL-003
    title: "Reveal automatico con intervallo configurabile e feedback admin"
    area: "admin-tools.html, admin.html, vota.html, admin-bookings"
    description: >
      Con reveal attivo in modalità automatica, l'intervallo tra una posizione e
      la successiva deve essere configurabile nelle impostazioni. Nel pannello admin
      devono comparire solo annuncio dinamico ("Svelando la posizione X") e timer
      di avanzamento che si resetta a ogni step.
    status: implemented
    generate_issue: false
    labels: [winner-reveal, admin, automation]
    test_cases: [TC-REVEAL-003]

  # ── Sincronizzazione realtime ────────────────────────────────────────────────

  - id: REQ-SYNC-001
    title: "Sync stato karaoke realtime-first con poll di fallback garantito"
    area: "scripts/serata-sync.js, index.html, vota.html"
    description: >
      L'aggiornamento dello stato karaoke usa una strategia unica (createSerataSync):
      iscrizione realtime agli eventi postgres_changes delle tabelle osservate più un
      poll di fallback sempre attivo (pollMs > 0; pollMs = 0 abilita solo realtime).
      Sia gli eventi realtime sia il poll richiamano lo stesso ciclo di sync che
      ri-legge lo stato autorevole (fetchState) e lo passa a onChange. Gli eventi
      realtime sono debounced/coalizzati e il ciclo di vita del canale è gestito
      (removeChannel prima di ri-iscriversi) per evitare canali stale.
    status: implemented
    generate_issue: false
    labels: [realtime, sync]
    test_cases: [TC-SYNC-001, TC-SYNC-002, TC-SYNC-003]

  # ── Manutenzione ─────────────────────────────────────────────────────────────

  - id: REQ-MAINT-001
    title: "Modalità manutenzione con redirect utenti e banner admin"
    area: "scripts/maintenance-mode.js, admin-tools.html, supabase/functions/admin-bookings/index.ts, impostazioni_pubbliche.manutenzione_abilitata"
    description: >
      L'admin può attivare/disattivare la modalità manutenzione (flag
      manutenzione_abilitata). Quando è attiva, gli utenti non admin vengono
      reindirizzati alla home/pagina di manutenzione, mentre gli admin autenticati
      continuano a navigare e vedono un banner che segnala lo stato di manutenzione.
      Titolo e messaggio della pagina di manutenzione sono configurabili
      (home_maintenance_title, home_maintenance_message).
    status: implemented
    generate_issue: false
    labels: [maintenance, settings, admin]
    test_cases: [TC-MAINT-001]

  # ── Ads / monetizzazione ─────────────────────────────────────────────────────

  - id: REQ-ADS-001
    title: "Policy ads centralizzata con default sicuri"
    area: "scripts/ads-config.js"
    description: >
      La configurazione ads (ADS_ENABLED, ADS_MODE off|soft|intrusive,
      ADS_PROVIDER none|adsense|custom, id AdSense, ADS_REQUIRE_BEFORE_BOOKING)
      viene normalizzata in un oggetto policy stabile con default sicuri se i valori
      mancano o non sono validi. Il banner è abilitato solo se enabled e mode != off;
      requireBeforeBooking solo se il banner è abilitato; adsenseReady solo se
      provider=adsense e sono presenti sia client id sia slot.
    status: implemented
    generate_issue: false
    labels: [ads, config]
    test_cases: [TC-ADS-001, TC-ADS-002]

  - id: REQ-ADS-002
    title: "Rendering banner/inline ads con fallback placeholder"
    area: "scripts/ads-banner.js, scripts/ads-loader.js, index.html"
    description: >
      Il rendering del banner sponsor isola il provider e non rompe mai la pagina:
      con provider mancante o configurazione AdSense incompleta viene mostrato un
      placeholder sicuro. La modalità intrusive applica la classe
      ads-intrusive-active al body; il banner disabilitato pulisce il container e
      rimuove la classe intrusive.
    status: implemented
    generate_issue: false
    labels: [ads, ui]
    test_cases: [TC-ADS-003, TC-ADS-004]

  - id: REQ-ADS-003
    title: "Booking gate opzionale prima della prenotazione"
    area: "scripts/booking-gate.js, index.html"
    description: >
      Se ADS_REQUIRE_BEFORE_BOOKING è attivo e gli ads sono abilitati, il click su
      "Prenota" mostra prima una modale sponsor con percorso esplicito "Continua".
      Se gli ads sono off/disabilitati la prenotazione procede senza step aggiuntivi.
    status: implemented
    generate_issue: false
    labels: [ads, booking, ui]
    test_cases: [TC-ADS-005]

  # ── Visibilità voti e notifiche ──────────────────────────────────────────────

  - id: REQ-VOTE-001
    title: "Visibilità pubblica dei totali voti configurabile"
    area: "admin.html, admin-tools.html, vota.html, supabase/functions/admin-bookings/index.ts, impostazioni_pubbliche.mostra_voti_totali"
    description: >
      L'admin può attivare/disattivare la visibilità pubblica dei totali voti
      (flag mostra_voti_totali). Quando attiva, vota.html mostra i totali a tutti
      gli utenti; il campo viene comunque nascosto all'avvio del countdown di
      proclamazione.
    status: implemented
    generate_issue: false
    labels: [voting, settings, admin]
    test_cases: [TC-VOTE-001]

  - id: REQ-NOTIFY-001
    title: "Toggle notifiche Telegram e browser per nuove prenotazioni"
    area: "admin.html, admin-tools.html, supabase/functions/admin-bookings/index.ts, impostazioni_pubbliche"
    description: >
      L'admin può attivare/disattivare in modo indipendente le notifiche Telegram
      (notifiche_telegram_abilitate) e le notifiche browser
      (notifiche_browser_abilitate) per le nuove prenotazioni. Entrambe sono attive
      di default all'apertura di una serata.
    status: implemented
    generate_issue: false
    labels: [notifications, admin, settings]
    test_cases: [TC-NOTIFY-001]

  # ── Archivio serate ──────────────────────────────────────────────────────────

  - id: REQ-ARCHIVE-001
    title: "Archivio pubblico delle serate concluse"
    area: "archive.html, supabase/functions/admin-bookings/index.ts (get_archive), impostazioni_pubbliche.archivio_pubblico_abilitato"
    description: >
      Le serate concluse sono consultabili in un archivio pubblico (archive.html)
      quando l'archivio pubblico è abilitato. Il listing pubblico restituisce solo
      le serate non nascoste.
    status: implemented
    generate_issue: false
    labels: [archive, ui]
    test_cases: [TC-ARCHIVE-001]

  - id: REQ-ARCHIVE-002
    title: "Controlli admin su visibilità e copertina delle serate archiviate"
    area: "admin-tools.html, supabase/functions/admin-bookings/index.ts (set_archive_visibility, set_archive_cover)"
    description: >
      Per le serate concluse l'admin può nascondere/mostrare la serata
      nell'archivio pubblico (archiviato_nascosto) e scegliere l'immagine di
      copertina: copertina di default (cover_use_default), automatica
      (vincitore/random) oppure il selfie di una prenotazione specifica
      (cover_prenotazione_id), con validazione che la prenotazione appartenga alla
      serata.
    status: implemented
    generate_issue: false
    labels: [archive, admin, settings]
    test_cases: [TC-ARCHIVE-002]

  # ── Diretta proclamazione vincitore ──────────────────────────────────────────

  - id: REQ-REVEAL-004
    title: "Diretta proclamazione vincitore attivabile da admin"
    area: "admin.html, vota.html, supabase/functions/admin-bookings/index.ts (enable_diretta, disable_diretta)"
    description: >
      A votazioni chiuse l'admin può abilitare la "diretta": vota.html mostra la
      schermata "Il vincitore sta per essere rivelato…" e le prenotazioni vengono
      disabilitate (winner_reveal_countdown_active=true). L'admin può disabilitare
      la diretta prima del countdown. In modalità proclamazione è disponibile anche
      la proclamazione diretta che pubblica subito il vincitore senza countdown
      pubblico.
    status: implemented
    generate_issue: false
    labels: [winner-reveal, admin, control]
    test_cases: [TC-REVEAL-004]

  # ── Esempi di requisiti "da implementare" (generate_issue: true) ─────────────
