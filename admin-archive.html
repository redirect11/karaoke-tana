<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivio karaoke – La Tana del Coniglio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0e0518;
      color: #f0e6d3;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .box {
      background: #2a1650;
      border: 1px solid #3d2366;
      border-radius: 14px;
      padding: 28px 24px;
      max-width: 380px;
      text-align: center;
    }
    .logo { font-size: 2.6rem; margin-bottom: 12px; }
    h2 { color: #d4a017; font-size: 1.15rem; margin-bottom: 6px; }
    p { color: #a08ca0; font-size: 0.88rem; line-height: 1.5; }
    input, button {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid #3d2366;
      background: #1e0f35;
      color: #f0e6d3;
      font-size: 0.94rem;
      margin-top: 12px;
    }
    button {
      background: #d4a017; color: #12071f; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: wait; }
    .error { color: #ff6b6b; font-size: 0.82rem; margin-top: 10px; min-height: 18px; }
    .hint { font-size: 0.78rem; color: #a08ca0; margin-top: 16px; }
    .hint a { color: #f0c94a; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box" id="login-box">
    <div class="logo">📚</div>
    <h2>Archivio admin</h2>
    <p>L'archivio admin è ora la stessa pagina <strong>archive.html</strong>: se accedi con la password admin trovi i controlli inline per nascondere/mostrare edizioni e scegliere la foto di copertina.</p>
    <input id="pwd" type="password" placeholder="password admin" autocomplete="current-password" />
    <button id="btn">Accedi e apri archivio</button>
    <div class="error" id="err"></div>
    <p class="hint">Hai già fatto il login dal pannello staff? <a href="archive.html">Apri archivio direttamente →</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script>
    const config = (typeof window.CONFIG === 'object' && window.CONFIG) || (typeof CONFIG === 'object' && CONFIG) || {};
    const supabaseReady = config.SUPABASE_URL && !config.SUPABASE_URL.includes('TUO-PROGETTO');
    const ADMIN_EMAIL = 'admin@tana.it';
    const supabaseClient = supabaseReady
      ? window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY || '', {
          auth: { persistSession: true, storage: sessionStorage },
        })
      : null;

    const pwd = document.getElementById('pwd');
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');

    // Se l'utente è già loggato in questa sessione (es. ha fatto login da admin.html
    // nello stesso tab), saltiamo direttamente alla pagina archivio.
    if (supabaseClient) {
      supabaseClient.auth.getSession().then(({ data }) => {
        if (data?.session?.access_token) {
          location.replace('archive.html');
        }
      }).catch(() => {});
    }

    async function login() {
      const password = pwd.value;
      if (!password) {
        err.textContent = 'Inserisci la password admin.';
        return;
      }
      if (!supabaseClient) {
        err.textContent = 'Configurazione Supabase mancante.';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Accesso in corso…';
      err.textContent = '';
      try {
        const { error } = await supabaseClient.auth.signInWithPassword({ email: ADMIN_EMAIL, password });
        if (error) throw error;
        location.replace('archive.html');
      } catch (error) {
        err.textContent = error?.message || 'Credenziali non valide.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Accedi e apri archivio';
      }
    }
    btn.addEventListener('click', login);
    pwd.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
