  <style>
    :root {
      --bg: #0e0518;
      --bg2: #1a0d2e;
      --card: #2a1650;
      --card2: #1d1430;
      --gold: #d4a017;
      --gold-soft: #f0c54a;
      --text: #f0e6d3;
      --muted: #a08ca0;
      --border: rgba(255,255,255,0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      padding: 24px 16px 96px;
      min-height: 100vh;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(140,40,180,0.22), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(212,160,23,0.16), transparent 60%),
        var(--bg);
    }
    .wrap { max-width: 1180px; margin: 0 auto; }

    /* ── Header ────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .title-block h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--gold) 60%, #b07a00 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 4px;
    }
    .title-block p { color: var(--muted); font-size: 0.92rem; }
    .back-link {
      color: var(--text); background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 16px; font-size: 0.86rem; text-decoration: none;
      transition: background 0.18s, border-color 0.18s;

    .back-link:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }

    /* ── Status / empty ────────────────────────────────── */
    .status-msg {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 24px; text-align: center;
      color: var(--muted); font-size: 0.95rem; line-height: 1.6;

    /* ── Gallery ───────────────────────────────────────── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }
    .tile {
      position: relative;
      --top-left-stack-offset: 0px;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 4 / 5;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, #2a1650 0%, #1d1430 100%);

      isolation: isolate;

    .tile.hero {
      grid-column: 1 / -1;
      aspect-ratio: 21 / 9;
    }
    @media (max-width: 760px) {
      .tile.hero { aspect-ratio: 4 / 5; }
    }
    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      border-color: rgba(212,160,23,0.45);
    }
    .tile-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transform: scale(1.06);
      transition: transform 0.6s ease;
      z-index: 0;

    .tile:hover .tile-bg { transform: scale(1.12); }

      background-position: center !important;

        rgba(14,5,24,0.78) 80%,
        rgba(14,5,24,0.94) 100%);

    .tile-content {

      gap: 12px;

    .tile-date-pill {

    .tile-winner-name {

    .tile.hero .tile-winner-song { font-size: 1rem; }

    .tile.hero .tile-top5-chip-name { max-width: 200px; }

      .tile.hero .tile-top5 { flex-direction: row; align-items: flex-start; max-width: none; }

    /* ── Detail modal ──────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      overflow-y: auto;
      opacity: 0;
      transition: opacity 0.22s ease;

    .modal-overlay.open { display: flex; opacity: 1; }
    .modal {

    /* Podium */

    .podium-avatar {

    .podium-download-btn {

    }

    .full-ranking-list { display: flex; flex-direction: column; gap: 8px; }
    .full-ranking-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .full-ranking-row.winner {
      border-color: rgba(212,160,23,0.45);

    .full-ranking-rank {

      font-weight: 800;
      flex-shrink: 0;
    }
    .full-ranking-row.winner .full-ranking-rank {
      background: var(--gold);
      color: #1a0a00;
    }
    .full-ranking-info { flex: 1; min-width: 0; }
    .full-ranking-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .full-ranking-song { font-size: 0.78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .full-ranking-score { font-size: 0.78rem; font-weight: 800; color: var(--gold-soft); text-align: right; white-space: nowrap; }

    /* Song list */
    .songlist { display: flex; flex-direction: column; gap: 8px; }
    .songlist-row {
      display: flex; align-items: center; gap: 12px;

    .empty-section { color: var(--muted); font-size: 0.88rem; font-style: italic; padding: 12px 0; }

    /* ── Admin controls (visibili solo se logato come admin) ── */
    .admin-banner {
      background: linear-gradient(135deg, rgba(212,160,23,0.18) 0%, rgba(140,40,180,0.12) 100%);
      border: 1px solid rgba(212,160,23,0.4);
      border-radius: 12px;

      display: flex; align-items: center; gap: 10px;

    }

    /* Cover picker modal */
    .cover-picker-overlay {

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="scripts/maintenance-mode.js"></script>
  <script>
    const config = (typeof window.CONFIG === 'object' && window.CONFIG) || (typeof CONFIG === 'object' && CONFIG) || {};
    const supabaseReady = config.SUPABASE_URL && !config.SUPABASE_URL.includes('TUO-PROGETTO');
    const supabaseUrl = `${config.SUPABASE_URL || ''}`;
    const edgeBaseUrl = supabaseReady ? `${supabaseUrl.replace(/\/+$/, '')}/functions/v1` : '';
    const adminBookingsUrl = supabaseReady ? `${edgeBaseUrl}/admin-bookings` : '';
    const db = supabaseReady ? window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY || '') : null;
    const archiveRoot = document.getElementById('archive-root');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');
    let adminToken = '';
    let isAdmin = false;
    let simulateUserView = false;

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }

    // Riscrive URL Supabase localhost → hostname della pagina (LAN).
    function resolveLanUrl(url) {
      if (typeof url !== 'string' || !url) return url;
      const host = typeof window !== 'undefined' && window.location && window.location.hostname;
      if (!host || host === 'localhost' || host === '127.0.0.1') return url;
      return url.replace(/^(https?:\/\/)(localhost|127\.0\.0\.1)(:|\/|$)/, `$1${host}$3`);
    }

    function formatDateLabel(dateIso, withWeekday = true) {
      if (!dateIso) return 'Data non disponibile';
      const [year, month, day] = String(dateIso).split('-').map(Number);
      if (!year || !month || !day) return String(dateIso);
      return new Date(Date.UTC(year, month - 1, day)).toLocaleDateString('it-IT', {
        weekday: withWeekday ? 'long' : undefined,
        day: '2-digit',
        month: 'long',
        year: 'numeric',
        timeZone: 'UTC',
      }).trim();
    }

    function formatDateShort(dateIso) {
      if (!dateIso) return '';
      const [y, m, d] = String(dateIso).split('-').map(Number);
      if (!y || !m || !d) return String(dateIso);
      return new Date(Date.UTC(y, m - 1, d)).toLocaleDateString('it-IT', {
        day: '2-digit', month: 'short', year: 'numeric', timeZone: 'UTC',
      });
    }

    function sanitizeFilePart(value, fallback = 'file') {
      const cleaned = String(value ?? '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9-_]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .toLowerCase();
      return cleaned || fallback;
    }

    function getSelfieExtension(rawUrl) {
      try {
        const parsed = new URL(resolveLanUrl(rawUrl || ''), window.location.href);
        const pathname = parsed.pathname || '';
        const match = pathname.match(/\.([a-zA-Z0-9]{2,5})$/);
        return match ? match[1].toLowerCase() : 'jpg';
      } catch (_) {
        return 'jpg';
      }
    }

    function getEditionFilePrefix(serata) {
      const dateKey = String(serata?.archive_date || serata?.data || '')
        .replace(/[^0-9]/g, '')
        .slice(0, 8);
      return dateKey || `edizione-${Number(serata?.id) || 'x'}`;
    }

    function triggerBlobDownload(blob, filename) {
      const objectUrl = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = objectUrl;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(objectUrl);
    }

    let crc32Table = null;
    function getCrc32Table() {
      if (crc32Table) return crc32Table;
      crc32Table = new Uint32Array(256);
      for (let tableIndex = 0; tableIndex < 256; tableIndex += 1) {
        let c = tableIndex;
        for (let bit = 0; bit < 8; bit += 1) {
          c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        }
        crc32Table[tableIndex] = c >>> 0;
      }
      return crc32Table;
    }

    function computeCrc32(bytes) {
      const table = getCrc32Table();
      let crc = 0xFFFFFFFF;
      for (let byteIndex = 0; byteIndex < bytes.length; byteIndex += 1) {
        crc = table[(crc ^ bytes[byteIndex]) & 0xFF] ^ (crc >>> 8);
      }
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }

    function getDosDateTime(date = new Date()) {
      const year = Math.min(Math.max(date.getFullYear(), 1980), 2107);
      const dosTime = ((date.getHours() & 0x1F) << 11)
        | ((date.getMinutes() & 0x3F) << 5)
        | ((Math.floor(date.getSeconds() / 2)) & 0x1F);
      const dosDate = (((year - 1980) & 0x7F) << 9)
        | (((date.getMonth() + 1) & 0x0F) << 5)
        | (date.getDate() & 0x1F);
      return { dosTime, dosDate };
    }

    function createZipBlob(entries) {
      const encoder = new TextEncoder();
      const chunks = [];
      const centralDirectoryChunks = [];
      let offset = 0;
      let centralDirectorySize = 0;

      entries.forEach((entry) => {
        const nameBytes = encoder.encode(entry.filename);
        const fileBytes = entry.bytes;
        const crc32 = computeCrc32(fileBytes);
        const { dosTime, dosDate } = getDosDateTime(new Date());

        const localHeader = new ArrayBuffer(30);
        const localView = new DataView(localHeader);
        localView.setUint32(0, 0x04034B50, true);
        localView.setUint16(4, 20, true);
        localView.setUint16(6, 0x0800, true);
        localView.setUint16(8, 0, true);
        localView.setUint16(10, dosTime, true);
        localView.setUint16(12, dosDate, true);
        localView.setUint32(14, crc32, true);
        localView.setUint32(18, fileBytes.length, true);
        localView.setUint32(22, fileBytes.length, true);
        localView.setUint16(26, nameBytes.length, true);
        localView.setUint16(28, 0, true);

        chunks.push(new Uint8Array(localHeader), nameBytes, fileBytes);

        const centralHeader = new ArrayBuffer(46);
        const centralView = new DataView(centralHeader);
        centralView.setUint32(0, 0x02014B50, true);
        centralView.setUint16(4, 20, true);
        centralView.setUint16(6, 20, true);
        centralView.setUint16(8, 0x0800, true);
        centralView.setUint16(10, 0, true);
        centralView.setUint16(12, dosTime, true);
        centralView.setUint16(14, dosDate, true);
        centralView.setUint32(16, crc32, true);
        centralView.setUint32(20, fileBytes.length, true);
        centralView.setUint32(24, fileBytes.length, true);
        centralView.setUint16(28, nameBytes.length, true);
        centralView.setUint16(30, 0, true);
        centralView.setUint16(32, 0, true);
        centralView.setUint16(34, 0, true);
        centralView.setUint16(36, 0, true);
        centralView.setUint32(38, 0, true);
        centralView.setUint32(42, offset, true);

        centralDirectoryChunks.push(new Uint8Array(centralHeader), nameBytes);

        const localSize = 30 + nameBytes.length + fileBytes.length;
        const centralSize = 46 + nameBytes.length;
        offset += localSize;
        centralDirectorySize += centralSize;
      });

      const centralDirectoryOffset = offset;
      chunks.push(...centralDirectoryChunks);

      const endRecord = new ArrayBuffer(22);
      const endView = new DataView(endRecord);
      endView.setUint32(0, 0x06054B50, true);
      endView.setUint16(4, 0, true);
      endView.setUint16(6, 0, true);
      endView.setUint16(8, entries.length, true);
      endView.setUint16(10, entries.length, true);
      endView.setUint32(12, centralDirectorySize, true);
      endView.setUint32(16, centralDirectoryOffset, true);
      endView.setUint16(20, 0, true);
      chunks.push(new Uint8Array(endRecord));

      return new Blob(chunks, { type: 'application/zip' });
    }

    function buildSelfieFilename(serata, booking, sourceUrl) {
      const extension = getSelfieExtension(sourceUrl);
      const editionPrefix = getEditionFilePrefix(serata);
      const namePart = sanitizeFilePart(booking?.nome || 'partecipante', `prenotazione-${Number(booking?.id) || 'x'}`);
      const bookingId = Number(booking?.id) || 'x';
      return `${editionPrefix}-selfie-${namePart}-${bookingId}.${extension}`;
    }

    async function downloadSelfieBlob(booking) {
      const rawUrl = typeof booking?.selfie_url === 'string' ? booking.selfie_url : '';
      if (!rawUrl) throw new Error('Selfie non disponibile.');
      const sourceUrl = resolveLanUrl(rawUrl);
      const response = await fetch(sourceUrl);
      if (!response.ok) throw new Error(`Download selfie fallito (${response.status} ${response.statusText || 'errore'}).`);
      const blob = await response.blob();
      return { blob, sourceUrl };
    }

    async function downloadSelfie(serata, booking) {
      const { blob, sourceUrl } = await downloadSelfieBlob(booking);
      const filename = buildSelfieFilename(serata, booking, sourceUrl);
      triggerBlobDownload(blob, filename);
    }

    function buildRanking(bookings, scoreMap) {
      return bookings
        .map((b) => {
          const s = scoreMap.get(Number(b.id)) || { total: 0, count: 0 };
          return { ...b, score_total: s.total, score_count: s.count, score_avg: s.count ? s.total / s.count : 0 };
        })
        .sort((a, b) => {
          if (b.score_total !== a.score_total) return b.score_total - a.score_total;
          if (b.score_avg !== a.score_avg) return b.score_avg - a.score_avg;
          if (b.score_count !== a.score_count) return b.score_count - a.score_count;
          return String(a.created_at || '').localeCompare(String(b.created_at || ''));
        });
    }

    async function loadSettings() {
      const { data, error } = await db
        .from('impostazioni_pubbliche')
        .select('archivio_pubblico_abilitato, prossima_serata_data')
        .eq('id', 1)
        .maybeSingle();
      if (error) throw error;
      return data || { archivio_pubblico_abilitato: false, prossima_serata_data: null };
    }

    async function loadEverything() {
      let query = db
        .from('serate')
        .select('id, data, created_at, vincitore_prenotazione_id, vincitore_decretato, archiviato_nascosto, cover_prenotazione_id, cover_use_default')
        .eq('aperta', false)
        .order('data', { ascending: false })
        .order('created_at', { ascending: false });
      // Solo l'admin vede anche le serate nascoste (a meno che non stia simulando la vista utente)
      if (!isAdmin || simulateUserView) query = query.eq('archiviato_nascosto', false);
      const { data: serate, error: errSerate } = await query;
      if (errSerate) throw errSerate;
      const serateList = (serate || []).map((s) => {
        const parsed = Date.parse(String(s?.created_at || ''));
        const archiveDate = Number.isFinite(parsed)
          ? new Date(parsed).toISOString().slice(0, 10)
          : (s?.data || null);
        return { ...s, archive_date: archiveDate };
      });
      const serateIds = serateList.map((s) => Number(s.id)).filter((id) => Number.isInteger(id) && id > 0);
      if (!serateIds.length) return { serate: [], songsBySerata: new Map(), votesByPrenotazione: new Map() };

      // Fetchiamo TUTTE le prenotazioni delle serate (anche non cantate)
      // così la cover_prenotazione_id può puntare a un selfie di un
      // partecipante che non ha cantato. Il rendering songs/top5
      // filtrerà solo `cantata = true`.
      const { data: songs, error: errSongs } = await db
        .from('prenotazioni')
        .select('id, nome, canzone, artista, selfie_url, serata_id, created_at, cantata, approvata')
        .in('serata_id', serateIds);
      if (errSongs) throw errSongs;
      const songsBySerata = new Map();
      const allBookingsBySerata = new Map();
      const songIds = [];
      (songs || []).forEach((song) => {
        const sid = Number(song.serata_id);
        if (!Number.isInteger(sid)) return;
        if (!allBookingsBySerata.has(sid)) allBookingsBySerata.set(sid, []);
        allBookingsBySerata.get(sid).push(song);
        if (song.cantata) {
          if (!songsBySerata.has(sid)) songsBySerata.set(sid, []);
          songsBySerata.get(sid).push(song);
          if (Number.isInteger(Number(song.id))) songIds.push(Number(song.id));
        }
      });

      const votesByPrenotazione = new Map();
      if (songIds.length) {
        const { data: votes, error: errVotes } = await db
          .from('voti')
          .select('prenotazione_id, voto')
          .in('prenotazione_id', songIds);
        if (errVotes) throw errVotes;
        (votes || []).forEach((v) => {
          const k = Number(v.prenotazione_id);
          const val = Number(v.voto);
          if (!Number.isInteger(k) || !Number.isFinite(val)) return;
          const prev = votesByPrenotazione.get(k) || { total: 0, count: 0 };
          prev.total += val;
          prev.count += 1;
          votesByPrenotazione.set(k, prev);
        });
      }
      return { serate: serateList, songsBySerata, votesByPrenotazione, allBookingsBySerata };
    }

    function computeSerataView(serata, songsBySerata, votesByPrenotazione, allBookingsBySerata) {
      const songs = songsBySerata.get(Number(serata.id)) || [];
      const allBookings = (allBookingsBySerata && allBookingsBySerata.get(Number(serata.id))) || songs;
      const ranking = buildRanking(songs, votesByPrenotazione);
      const top5 = ranking.filter((r) => r.score_count > 0).slice(0, 5);
      const decreedWinnerId = Number(serata.vincitore_prenotazione_id);
      let winner = null;
      if (Number.isInteger(decreedWinnerId) && decreedWinnerId > 0) {
        winner = ranking.find((r) => Number(r.id) === decreedWinnerId) || songs.find((s) => Number(s.id) === decreedWinnerId) || null;
      }
      if (!winner && top5.length) winner = top5[0];

      // Cover photo priority order:
      //   1. cover_use_default=true            → logo.png (placeholder)
      //   2. cover_prenotazione_id             → selfie specifico
      //   3. selfie del vincitore
      //   4. random tra i selfie caricati
      let coverUrl = '';
      if (serata.cover_use_default) {
        coverUrl = 'logo.png';
      } else {
        const coverOverrideId = Number(serata.cover_prenotazione_id);
        if (Number.isInteger(coverOverrideId) && coverOverrideId > 0) {
          const coverBooking = allBookings.find((b) => Number(b.id) === coverOverrideId);
          if (coverBooking?.selfie_url) coverUrl = coverBooking.selfie_url;
        }
        if (!coverUrl) coverUrl = winner?.selfie_url || '';
        if (!coverUrl) {
          const withSelfies = allBookings.filter((b) => typeof b.selfie_url === 'string' && b.selfie_url.length > 0);
          if (withSelfies.length) {
            coverUrl = withSelfies[Math.floor(Math.random() * withSelfies.length)].selfie_url;
          }
        }
        // Nessuna foto disponibile: usa il logo come fallback
        if (!coverUrl) coverUrl = 'logo.png';
      }
      return { songs, ranking, top5, winner, coverUrl, allBookings };
    }

    function renderTile(serata, view, opts = {}) {
      const { hero = false } = opts;
      const dateLabel = formatDateLabel(serata.archive_date || serata.data, !hero);
      const winner = view.winner;
      const selfieUrl = resolveLanUrl(view.coverUrl || '');
      const winnerName = winner?.nome || '';
      const winnerSong = winner ? `${winner.canzone}${winner.artista ? ' — ' + winner.artista : ''}` : '';
      const hidden = Boolean(serata.archiviato_nascosto);
      const adminActionsHtml = isAdmin
        ? `<div class="tile-admin-actions" data-stop>
             <button type="button" class="tile-admin-btn" data-admin-action="toggle-visibility" data-serata-id="${Number(serata.id)}" title="${hidden ? 'Rendi pubblica' : 'Nascondi dal pubblico'}">
               ${hidden ? '👁️ Mostra' : '🙈 Nascondi'}
             </button>
             <button type="button" class="tile-admin-btn" data-admin-action="pick-cover" data-serata-id="${Number(serata.id)}" title="Cambia foto di copertina">
               📷 Cover
             </button>
            <button type="button" class="tile-admin-btn" data-admin-action="download-selfies" data-serata-id="${Number(serata.id)}" title="Scarica tutti i selfie di questa edizione">
              ⬇️ Download
             </button>
            <button type="button" class="tile-admin-btn" data-admin-action="delete-serata" data-serata-id="${Number(serata.id)}" title="Elimina edizione" style="color:#ff8888;">
              🗑️ Cancella
            </button>
           </div>`
        : '';
      const showWinnerBadge = winner && (serata.vincitore_decretato || view.top5.length > 0);

      const top5Html = view.top5.length
        ? `<div class="tile-top5">${view.top5.map((item, idx) => `
            <span class="tile-top5-chip">
              <span class="tile-top5-chip-rank">${idx + 1}°</span>
              <span class="tile-top5-chip-name">${esc(item.nome)}</span>
            </span>
          `).join('')}</div>`
        : '';

      const isLogo = selfieUrl === 'logo.png' || selfieUrl.endsWith('/logo.png');
      const bgHtml = selfieUrl
        ? `<div class="tile-bg${isLogo ? ' logo-cover' : ''}" style="background-image:url('${esc(selfieUrl)}')"></div>`
        : `<div class="tile-bg placeholder"></div>`;

      const tileClass = `tile${hero ? ' hero' : ''}${hidden ? ' is-hidden' : ''}`;
      const heroLayout = hero;
      if (heroLayout) {
        return `
          <article class="${tileClass}" data-serata-id="${Number(serata.id)}">
            ${bgHtml}
            <div class="tile-gradient"></div>
            ${adminActionsHtml}
            <div class="tile-content">
              <span class="tile-date-pill">${esc(dateLabel)}</span>
              <div class="tile-main">
                ${showWinnerBadge ? '<span class="tile-winner-badge">🏆 Vincitore</span>' : ''}
                ${winner
                  ? `<div class="tile-winner-name">${esc(winnerName)}</div>
                     <div class="tile-winner-song">${esc(winnerSong)}</div>`
                  : '<div class="tile-no-data">Nessuna classifica per questa edizione</div>'}
              </div>
              ${top5Html}
            </div>
          </article>
        `;
      }

      return `
        <article class="${tileClass}" data-serata-id="${Number(serata.id)}">
          ${bgHtml}
          <div class="tile-gradient"></div>
          ${adminActionsHtml}
          <div class="tile-content">
            <span class="tile-date-pill">${esc(dateLabel)}</span>
            <div class="tile-info">
              ${winner
                ? `${showWinnerBadge ? '<span class="tile-winner-badge">🏆 Vincitore</span>' : ''}
                   <div class="tile-winner-name">${esc(winnerName)}</div>
                   <div class="tile-winner-song">${esc(winnerSong)}</div>`
                : '<div class="tile-no-data">Nessuna classifica per questa edizione</div>'}
              ${top5Html}
            </div>
          </div>
        </article>
      `;
    }

    function renderGallery(serate, songsBySerata, votesByPrenotazione, allBookingsBySerata) {
      if (!serate.length) {
        archiveRoot.innerHTML = `${isAdmin ? renderAdminBanner() : ''}<div class="status-msg">Nessuna edizione archiviata.</div>`;
        if (isAdmin) wireAdminBanner();
        return;
      }
      const views = serate.map((s) => ({ serata: s, view: computeSerataView(s, songsBySerata, votesByPrenotazione, allBookingsBySerata) }));
      const [first, ...rest] = views;
      const html = `
        ${isAdmin ? renderAdminBanner() : ''}
        <div class="gallery">
          ${renderTile(first.serata, first.view, { hero: true })}
          ${rest.map((v) => renderTile(v.serata, v.view)).join('')}
        </div>
      `;
      archiveRoot.innerHTML = html;
      if (isAdmin) wireAdminBanner();
      archiveRoot.querySelectorAll('article.tile').forEach((tileEl) => {
        tileEl.addEventListener('click', (e) => {
          // Click sui controlli admin (pulsanti) non aprono la modale
          if (e.target.closest('[data-admin-action]')) return;
          if (e.target.closest('[data-stop]')) return;
          const id = Number(tileEl.getAttribute('data-serata-id'));
          const found = views.find((v) => Number(v.serata.id) === id);
          if (found) openModal(found.serata, found.view);
        });
      });
      // Gestione azioni admin
      archiveRoot.querySelectorAll('[data-admin-action]').forEach((btn) => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const action = btn.getAttribute('data-admin-action');
          const serataId = Number(btn.getAttribute('data-serata-id'));
          const found = views.find((v) => Number(v.serata.id) === serataId);
          if (!found) return;
          if (action === 'toggle-visibility') {
            await adminToggleVisibility(found.serata, btn);
          } else if (action === 'pick-cover') {
            openCoverPicker(found.serata, found.view);
          } else if (action === 'download-selfies') {
            await adminDownloadEditionSelfies(found.serata, found.view, btn);
          } else if (action === 'delete-serata') {
            await adminDeleteSerata(found.serata, btn);
          }
        });
      });
    }

    function wireAdminBanner() {
      const simulateBtn = document.getElementById('btn-simulate-user-view');
      if (simulateBtn) {
        simulateBtn.addEventListener('click', async () => {
          simulateUserView = !simulateUserView;
          await reloadGallery();
        });
      }
    }

    function renderAdminBanner() {
      return `<div class="admin-banner" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span>Modalità admin attiva: puoi nascondere edizioni, scegliere la foto di copertina, scaricare selfie ed eliminare edizioni.</span>
        <button type="button" id="btn-simulate-user-view" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 14px;border-radius:999px;cursor:pointer;font-size:0.8rem;font-weight:700;white-space:nowrap;">
          ${simulateUserView ? '👤 Vista utente (attiva) — clicca per disattivare' : '👁️ Simula vista utente'}
        </button>
      </div>`;
    }

    function renderModal(serata, view) {
      const winner = view.winner;
      const selfieUrl = resolveLanUrl(view.coverUrl || '');
      const dateLabel = formatDateLabel(serata.archive_date || serata.data, true);

      const fullRankingHtml = view.ranking.length
        ? `<div class="full-ranking-list">${view.ranking.map((item, idx) => `
            <div class="full-ranking-row${Number(item.id) === Number(winner?.id) ? ' winner' : ''}">
              <div class="full-ranking-rank">${idx + 1}</div>
              <div class="full-ranking-info">
                <div class="full-ranking-name">${esc(item.nome)}${Number(item.id) === Number(winner?.id) ? ' 👑' : ''}</div>
                <div class="full-ranking-song">${esc(item.canzone)}${item.artista ? ' — ' + esc(item.artista) : ''}</div>
              </div>
              <div class="full-ranking-score">${Number(item.score_total) || 0} pt<br><span style="font-size:0.68rem;color:var(--muted);font-weight:500;">${Number(item.score_count) || 0} vot${Number(item.score_count) === 1 ? 'o' : 'i'}</span></div>
              ${isAdmin && item.selfie_url
                ? `<button type="button" class="podium-download-btn" data-modal-admin-action="download-selfie" data-prenotazione-id="${Number(item.id)}">⬇️ Download</button>`
                : ''}
            </div>
          `).join('')}</div>`
        : '<div class="empty-section">Classifica non disponibile.</div>';

      modalContent.innerHTML = `
        <div class="modal-hero">
          ${selfieUrl
            ? `<div class="modal-hero-bg${(selfieUrl === 'logo.png' || selfieUrl.endsWith('/logo.png')) ? ' logo-cover' : ''}" style="background-image:url('${esc(selfieUrl)}')"></div>`
            : `<div class="modal-hero-bg" style="background:radial-gradient(circle at 30% 30%, rgba(212,160,23,0.18), transparent 60%), radial-gradient(circle at 70% 70%, rgba(140,40,180,0.30), transparent 60%), linear-gradient(135deg, #2a1650 0%, #1d1430 100%);"></div>`}
          <div class="modal-hero-gradient"></div>
          <button class="modal-close" id="modal-close-btn" aria-label="Chiudi">×</button>
          <div class="modal-hero-content">
            <div class="modal-hero-date">${esc(dateLabel)}</div>
            <div class="modal-hero-title" id="modal-title">${winner ? '🏆 ' + esc(winner.nome) : 'Edizione archiviata'}</div>
            ${winner ? `<div class="tile-winner-song" style="font-size:0.95rem;">${esc(winner.canzone)}${winner.artista ? ' — ' + esc(winner.artista) : ''}</div>` : ''}
          </div>
        </div>
        <div class="modal-body">
          <div class="modal-section">
            <div class="modal-section-title">Classifica completa</div>
            ${fullRankingHtml}
          </div>
        </div>
      `;
      const closeBtn = document.getElementById('modal-close-btn');
      if (closeBtn) closeBtn.addEventListener('click', closeModal);
      modalContent.querySelectorAll('[data-modal-admin-action="download-selfie"]').forEach((btn) => {
        btn.addEventListener('click', async (event) => {
          event.preventDefault();
          const bookingId = Number(btn.getAttribute('data-prenotazione-id'));
          const booking = (view.ranking || []).find((item) => Number(item.id) === bookingId);
          if (!booking) return;
          btn.disabled = true;
          const previous = btn.textContent;
          btn.textContent = 'Scarico…';
          try {
            await downloadSelfie(serata, booking);
          } catch (error) {
            alert(error?.message || 'Download selfie fallito.');
          } finally {
            btn.disabled = false;
            btn.textContent = previous;
          }
        });
      });
    }

    function openModal(serata, view) {
      renderModal(serata, view);
      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
    });

    // ── Admin API helpers ─────────────────────────────────
    function getAdminHeaders() {
      const headers = new Headers({ 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` });
      if (config.SUPABASE_ANON_KEY) headers.set('apikey', config.SUPABASE_ANON_KEY);
      return headers;
    }
    async function callAdmin(action, payload = {}) {
      if (!adminToken || !adminBookingsUrl) throw new Error('Sessione admin mancante.');
      const response = await fetch(adminBookingsUrl, {
        method: 'POST',
        headers: getAdminHeaders(),
        body: JSON.stringify({ action, ...payload }),
      });
      let result = null;
      try { result = await response.json(); } catch (_) { result = null; }
      if (!response.ok || !result?.success) {
        throw new Error(result?.error?.message || 'Errore durante la richiesta admin.');
      }
      return result.data;
    }
    async function detectAdmin() {
      if (!db) return false;
      try {
        // La sessione admin (login da admin.html) è persistita in localStorage
        // e condivisa same-origin: il client `db` la carica automaticamente.
        const { data } = await db.auth.getSession();
        const token = data?.session?.access_token;
        if (!token) return false;
        // Verifica che il token sia di un admin chiamando ping
        adminToken = token;
        await callAdmin('ping');
        return true;
      } catch (_) {
        adminToken = '';
        return false;
      }
    }

    // ── Admin actions ─────────────────────────────────────
    async function adminToggleVisibility(serata, btn) {
      const wasHidden = Boolean(serata.archiviato_nascosto);
      btn.disabled = true;
      try {
        const data = await callAdmin('set_archive_visibility', {
          serataId: Number(serata.id),
          hidden: !wasHidden,
        });
        serata.archiviato_nascosto = Boolean(data?.archiviato_nascosto);
        // Re-render: la serata può sparire (se diventa hidden e l'admin filtra) o restare
        await reloadGallery();
      } catch (error) {
        alert(error?.message || 'Aggiornamento visibilità fallito.');
      } finally {
        btn.disabled = false;
      }
    }

    async function adminDeleteSerata(serata, btn) {
      const dateLabel = formatDateLabel(serata.archive_date || serata.data, false);
      if (!confirm(`Eliminare definitivamente l'edizione del ${dateLabel}?\n\nQuesta azione cancellerà anche tutte le prenotazioni e i voti associati. Non è reversibile.`)) return;
      btn.disabled = true;
      try {
        await callAdmin('delete_serata', { serataId: Number(serata.id) });
        await reloadGallery();
      } catch (error) {
        alert(error?.message || 'Eliminazione edizione fallita.');
        btn.disabled = false;
      }
    }

    async function adminDownloadEditionSelfies(serata, view, btn) {
      const selfies = (view?.allBookings || []).filter((booking) => typeof booking?.selfie_url === 'string' && booking.selfie_url.length > 0);
      if (!selfies.length) {
        alert('Nessun selfie disponibile in questa edizione.');
        return;
      }
      btn.disabled = true;
      const previous = btn.textContent;
      try {
        const zipEntries = [];
        for (const [index, booking] of selfies.entries()) {
          btn.textContent = `Preparo ${index + 1}/${selfies.length}…`;
          const { blob, sourceUrl } = await downloadSelfieBlob(booking);
          const filename = buildSelfieFilename(serata, booking, sourceUrl);
          const bytes = new Uint8Array(await blob.arrayBuffer());
          zipEntries.push({ filename, bytes });
        }
        btn.textContent = 'Creo ZIP…';
        const zipBlob = createZipBlob(zipEntries);
        const zipFilename = `${getEditionFilePrefix(serata)}-selfies.zip`;
        triggerBlobDownload(zipBlob, zipFilename);
        alert(`Download ZIP avviato per ${selfies.length} selfie di questa edizione.`);
      } catch (error) {
        alert(error?.message || 'Download selfie fallito.');
      } finally {
        btn.disabled = false;
        btn.textContent = previous;
      }
    }

    // ── Cover picker ──────────────────────────────────────
    const coverPickerOverlay = document.getElementById('cover-picker-overlay');
    const coverPickerContent = document.getElementById('cover-picker-content');
    let coverPickerState = null;

    function openCoverPicker(serata, view) {
      const bookings = (view.allBookings || []).filter((b) => typeof b.selfie_url === 'string' && b.selfie_url.length > 0);
      const currentCoverId = Number(serata.cover_prenotazione_id) || null;
      const currentUseDefault = serata.cover_use_default === true;
      coverPickerState = { serata, selectedId: currentUseDefault ? 'logo' : currentCoverId, useDefault: currentUseDefault };
      renderCoverPicker(bookings, currentCoverId, currentUseDefault);
      coverPickerOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeCoverPicker() {
      coverPickerOverlay.classList.remove('open');
      coverPickerContent.innerHTML = '';
      coverPickerState = null;
      document.body.style.overflow = '';
    }
    coverPickerOverlay.addEventListener('click', (e) => {
      if (e.target === coverPickerOverlay) closeCoverPicker();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && coverPickerOverlay.classList.contains('open')) closeCoverPicker();
    });

    function renderCoverPicker(bookings, currentCoverId, currentUseDefault) {
      const optionsHtml = bookings.length
        ? bookings.map((b) => `
            <div class="cover-option${Number(b.id) === currentCoverId && !currentUseDefault ? ' selected' : ''}"
                 style="background-image:url('${esc(resolveLanUrl(b.selfie_url))}')"
                 data-cover-id="${Number(b.id)}">
              <div class="cover-option-name">${esc(b.nome)}</div>
            </div>
          `).join('')
        : '<div class="empty-section" style="grid-column:1/-1">Nessun selfie caricato in questa edizione.</div>';
      coverPickerContent.innerHTML = `
        <h3>Scegli la foto di copertina</h3>
        <div class="cover-picker-grid">
          <div class="cover-option-empty${!currentCoverId && !currentUseDefault ? ' selected' : ''}" data-cover-id="">
            ↺ automatica (vincitore o random)
          </div>
          <div class="cover-option-empty${currentUseDefault ? ' selected' : ''}" data-cover-id="logo"
               style="background-image:url('logo.png'); background-size:contain; background-repeat:no-repeat; background-position:center; background-color:#1e0f35;">
            <div class="cover-option-name">Logo (default)</div>
          </div>
          ${optionsHtml}
        </div>
        <div class="cover-picker-footer">
          <button type="button" class="cover-picker-btn" data-action="cancel">Annulla</button>
          <button type="button" class="cover-picker-btn primary" data-action="save">Salva</button>
        </div>
      `;
      coverPickerContent.querySelectorAll('[data-cover-id]').forEach((el) => {
        el.addEventListener('click', () => {
          const raw = el.getAttribute('data-cover-id');
          if (raw === 'logo') {
            coverPickerState.selectedId = 'logo';
            coverPickerState.useDefault = true;
          } else {
            coverPickerState.selectedId = raw ? Number(raw) : null;
            coverPickerState.useDefault = false;
          }
          coverPickerContent.querySelectorAll('[data-cover-id]').forEach((n) => n.classList.remove('selected'));
          el.classList.add('selected');
        });
      });
      coverPickerContent.querySelector('[data-action="cancel"]').addEventListener('click', closeCoverPicker);
      coverPickerContent.querySelector('[data-action="save"]').addEventListener('click', saveCoverPicker);
    }

    async function saveCoverPicker() {
      if (!coverPickerState) return;
      const btn = coverPickerContent.querySelector('[data-action="save"]');
      btn.disabled = true;
      btn.textContent = 'Salvataggio…';
      try {
        await callAdmin('set_archive_cover', {
          serataId: Number(coverPickerState.serata.id),
          prenotazioneId: coverPickerState.useDefault ? null : coverPickerState.selectedId,
          useDefaultCover: coverPickerState.useDefault === true,
        });
        closeCoverPicker();
        await reloadGallery();
      } catch (error) {
        alert(error?.message || 'Salvataggio cover fallito.');
        btn.disabled = false;
        btn.textContent = 'Salva';
      }
    }

    // ── Init / reload ─────────────────────────────────────
    async function reloadGallery() {
      const { serate, songsBySerata, votesByPrenotazione, allBookingsBySerata } = await loadEverything();
      renderGallery(serate, songsBySerata, votesByPrenotazione, allBookingsBySerata);
    }

    async function init() {
      if (!db) {
        archiveRoot.innerHTML = '<div class="status-msg">Configurazione Supabase non disponibile.</div>';
        return;
      }
      try {
        if (window.KaraokeMaintenanceMode) {
          const maintenanceAccess = await window.KaraokeMaintenanceMode.getAccessState(config);
          if (maintenanceAccess.settings?.manutenzione_abilitata === true) {
            if (maintenanceAccess.isAdmin) {
              window.KaraokeMaintenanceMode.injectAdminBanner('⚠️ Modalità manutenzione attiva');
            } else if (!maintenanceAccess.isAuthenticated) {
              window.KaraokeMaintenanceMode.redirectToHome();
              return;
            }
          }
        }
        // Rilevazione admin: se c'è una sessione valida con permessi admin
        // mostriamo tutto (anche serate nascoste) e i controlli inline.
        isAdmin = await detectAdmin();

        if (!isAdmin) {
          const settings = await loadSettings();
          if (settings.archivio_pubblico_abilitato !== true) {
            const nextDateText = settings.prossima_serata_data
              ? `Prossimo karaoke: <strong style="color:var(--gold-soft)">${esc(formatDateLabel(settings.prossima_serata_data, true))}</strong>.`
              : 'Data del prossimo karaoke non ancora comunicata.';
            archiveRoot.innerHTML = `
              <div class="status-msg">
                Archivio non ancora disponibile pubblicamente.<br>${nextDateText}
              </div>`;
            return;
          }
        }
        await reloadGallery();
      } catch (error) {
        archiveRoot.innerHTML = `<div class="status-msg">${esc(error?.message || 'Errore durante il caricamento dell\'archivio.')}</div>`;
      }
    }

    init();
  </script>
