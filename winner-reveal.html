<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reveal Vincitore – La Tana del Coniglio</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6652706779509567" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #12071f;
      --card: #2a1650;
      --gold: #d4a017;
      --gold-s: #f0c94a;
      --text: #f0e6d3;
      --muted: #a08ca0;
      --green: #2ecc71;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(circle at top, #1f1040 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    header { text-align: center; }
    .logo { font-size: 2.4rem; }
    h1 { color: var(--gold); font-size: 1.4rem; margin-top: 4px; }
    .sub { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid #3d2366;
      border-radius: var(--radius);
      padding: 20px 18px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.45);
      text-align: center;
    }
    #state-title { color: var(--gold-s); font-size: 1.1rem; margin-bottom: 8px; }
    #state-text { color: var(--muted); font-size: 0.9rem; line-height: 1.45; }
    #countdown {
      margin-top: 14px;
      font-size: clamp(2.8rem, 13vw, 5rem);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 24px rgba(240,201,74,0.4);
      letter-spacing: 0.03em;
    }
    .hidden { display: none !important; }
    .winner-wrap {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .winner-hero {
      background: linear-gradient(145deg, rgba(212,160,23,0.2), rgba(42,22,80,0.95));
      border: 1px solid rgba(212,160,23,0.55);
      border-radius: var(--radius);
      padding: 22px 16px;
      text-align: center;
      transform: scale(0.98);
      opacity: 0;
      transition: transform 0.45s ease, opacity 0.45s ease;
    }
    .winner-hero.revealed {
      transform: scale(1);
      opacity: 1;
    }
    .winner-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 12px;
      background: var(--gold);
      color: #1a0d00;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .winner-name { font-size: clamp(1.6rem, 7vw, 2.5rem); font-weight: 900; margin-top: 10px; color: #fff; }
    .winner-song { margin-top: 4px; color: var(--gold-s); font-weight: 700; }
    .winner-score { margin-top: 5px; color: var(--muted); font-size: 0.86rem; }
    .top5 {
      background: rgba(18,7,31,0.35);
      border: 1px solid #3d2366;
      border-radius: 12px;
      padding: 10px;
      text-align: left;
      display: grid;
      gap: 6px;
    }
    .top5-item {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 0.86rem;
      padding: 6px 8px;
      border-radius: 9px;
      background: rgba(255,255,255,0.03);
    }
    .top5-rank { color: var(--gold-s); font-weight: 800; }
    .top5-name { font-weight: 700; color: var(--text); }
    .top5-points { color: var(--muted); font-size: 0.78rem; }
    .cta-link {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid rgba(212,160,23,0.55);
      color: var(--gold-s);
      background: rgba(212,160,23,0.08);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
  <link rel="stylesheet" href="scripts/vendor/cookieconsent.css" />
</head>
<body>
  <header>
    <div class="logo">🐰🏆</div>
    <h1>Winner Reveal</h1>
    <p class="sub">La Tana del Coniglio · Nola</p>
  </header>

  <section class="card" id="state-card">
    <h2 id="state-title">Caricamento reveal…</h2>
    <p id="state-text">Un attimo, stiamo sincronizzando la serata in corso.</p>
    <div id="countdown" class="hidden">00</div>
  </section>

  <section class="winner-wrap hidden" id="winner-wrap">
    <article class="winner-hero" id="winner-hero">
      <span class="winner-badge">🏆 Vincitore</span>
      <div class="winner-name" id="winner-name"></div>
      <div class="winner-song" id="winner-song"></div>
      <div class="winner-score" id="winner-score"></div>
    </article>
    <div class="top5" id="top5-list"></div>
    <a class="cta-link" href="vota.html">Apri classifica completa e voti →</a>
  </section>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script defer src="scripts/test-banner.js"></script>
  <script>
    const config = window.CONFIG || {};
    const supabaseReady = config.SUPABASE_URL && !config.SUPABASE_URL.includes('TUO-PROGETTO');
    const db = supabaseReady
      ? window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY)
      : null;

    const stateTitle = document.getElementById('state-title');
    const stateText = document.getElementById('state-text');
    const stateCard = document.getElementById('state-card');
    const countdownEl = document.getElementById('countdown');
    const winnerWrap = document.getElementById('winner-wrap');
    const winnerHero = document.getElementById('winner-hero');
    const winnerNameEl = document.getElementById('winner-name');
    const winnerSongEl = document.getElementById('winner-song');
    const winnerScoreEl = document.getElementById('winner-score');
    const top5ListEl = document.getElementById('top5-list');

    let serata = null;
    let countdownTimer = null;
    let pollTimer = null;
    let realtimeChannel = null;

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function redirectHome() {
      window.location.replace('index.html');
    }

    function setState(title, text, { showCountdown = false } = {}) {
      stateTitle.textContent = title;
      stateText.innerHTML = text;
      countdownEl.classList.toggle('hidden', !showCountdown);
    }

    function stopTimers() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function formatRemaining(seconds) {
      const safe = Math.max(0, seconds);
      return String(safe).padStart(2, '0');
    }

    function renderCountdownState() {
      const endsAt = Date.parse(serata?.winner_reveal_countdown_ends_at || '');
      if (!Number.isFinite(endsAt)) {
        setState('Reveal in preparazione', 'Il countdown è in avvio…');
        return;
      }

      setState('🎬 Reveal del vincitore in corso', 'Preparati: il vincitore verrà annunciato al termine del countdown.', { showCountdown: true });
      const tick = async () => {
        const remainingSec = Math.max(0, Math.ceil((endsAt - Date.now()) / 1000));
        countdownEl.textContent = formatRemaining(remainingSec);
        if (remainingSec > 0) return;
        setState('🏁 Countdown terminato', 'Attendi il decreto ufficiale del vincitore…');
        countdownEl.classList.add('hidden');
        clearInterval(countdownTimer);
        countdownTimer = null;
        if (!pollTimer) {
          pollTimer = setInterval(async () => {
            await loadOpenSerata();
          }, 2000);
        }
      };
      tick();
      if (!countdownTimer) countdownTimer = setInterval(tick, 500);
    }

    async function loadTop5() {
      const { data: rows, error } = await db
        .from('prenotazioni')
        .select('id, nome, canzone, artista, created_at, approvata')
        .eq('serata_id', serata.id)
        .eq('approvata', true)
        .order('created_at', { ascending: true });
      if (error || !rows?.length) return [];

      const ids = rows.map((row) => row.id);
      const votesResult = await db
        .from('voti')
        .select('prenotazione_id, voto')
        .in('prenotazione_id', ids);
      const votes = votesResult.data || [];
      const totals = {};
      votes.forEach((vote) => {
        const id = Number(vote.prenotazione_id);
        if (!totals[id]) totals[id] = { total: 0, count: 0, avg: 0 };
        totals[id].total += Number(vote.voto) || 0;
        totals[id].count += 1;
        totals[id].avg = totals[id].count > 0 ? totals[id].total / totals[id].count : 0;
      });

      return rows
        .map((row) => {
          const score = totals[row.id] || { total: 0, count: 0, avg: 0 };
          return { ...row, scoreTotal: score.total, scoreCount: score.count, scoreAvg: score.avg };
        })
        .sort((a, b) => {
          if (b.scoreTotal !== a.scoreTotal) return b.scoreTotal - a.scoreTotal;
          if (b.scoreAvg !== a.scoreAvg) return b.scoreAvg - a.scoreAvg;
          if (b.scoreCount !== a.scoreCount) return b.scoreCount - a.scoreCount;
          return String(a.created_at || '').localeCompare(String(b.created_at || ''));
        })
        .slice(0, 5);
    }

    async function renderWinner() {
      const top5 = await loadTop5();
      if (!top5.length) {
        setState('Vincitore decretato', 'Classifica non disponibile al momento. Riprova tra pochi secondi.');
        return;
      }
      const winnerId = Number(serata.vincitore_prenotazione_id) || Number(top5[0].id);
      const winner = top5.find((item) => Number(item.id) === winnerId) || top5[0];
      winnerNameEl.textContent = winner.nome || 'Vincitore';
      winnerSongEl.textContent = winner.artista ? `${winner.canzone} — ${winner.artista}` : (winner.canzone || '');
      winnerScoreEl.textContent = `${winner.scoreTotal} pt · ${winner.scoreCount} voti`;
      top5ListEl.innerHTML = top5.map((item, index) => `
        <div class="top5-item">
          <div class="top5-rank">${index + 1}°</div>
          <div class="top5-name">${escapeHtml(item.nome)}${Number(item.id) === Number(winner.id) ? ' 👑' : ''}</div>
          <div class="top5-points">${item.scoreTotal} pt</div>
        </div>
      `).join('');
      stateCard.classList.add('hidden');
      winnerWrap.classList.remove('hidden');
      requestAnimationFrame(() => winnerHero.classList.add('revealed'));
      stopTimers();
    }

    function applyRevealState() {
      if (!serata) {
        redirectHome();
        return;
      }
      if (!serata.aperta) {
        redirectHome();
        return;
      }
      if (serata.voto_aperto) {
        winnerWrap.classList.add('hidden');
        stateCard.classList.remove('hidden');
        setState('⏳ Reveal non disponibile', 'Torna quando le votazioni saranno chiuse.');
        stopTimers();
        return;
      }
      if (serata.vincitore_decretato) {
        renderWinner();
        return;
      }
      winnerWrap.classList.add('hidden');
      stateCard.classList.remove('hidden');
      if (serata.winner_reveal_countdown_active) {
        renderCountdownState();
      } else {
        setState('✅ Votazioni chiuse', 'Il countdown reveal non è ancora partito. Attendi l’avvio dallo staff panel.');
        stopTimers();
      }
    }

    async function loadOpenSerata() {
      if (!db) {
        setState('Configurazione mancante', 'Supabase non configurato.');
        return;
      }
      const { data, error } = await db
        .from('serate')
        .select('id, aperta, voto_aperto, vincitore_decretato, vincitore_prenotazione_id, winner_reveal_countdown_active, winner_reveal_countdown_started_at, winner_reveal_countdown_ends_at')
        .eq('aperta', true)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();
      if (error || !data) {
        redirectHome();
        return;
      }
      serata = data;
      applyRevealState();
      subscribeRealtime();
    }

    function subscribeRealtime() {
      if (!db || !serata?.id || realtimeChannel) return;
      realtimeChannel = db.channel(`winner-reveal-${serata.id}`)
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'serate',
          filter: `id=eq.${serata.id}`,
        }, async (payload) => {
          serata = payload.new;
          applyRevealState();
        })
        .subscribe();
    }

    loadOpenSerata();
  </script>
  <script defer src="scripts/vendor/cookieconsent.umd.js"></script>
  <script defer src="cookie-consent.js"></script>
</body>
</html>
