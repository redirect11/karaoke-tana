<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Panel – La Tana del Coniglio</title>
  <style>
    :root {
      --bg:     #12071f;
      --bg2:    #1e0f35;
      --card:   #2a1650;
      --card2:  #341a63;
      --gold:   #d4a017;
      --gold-s: #f0c94a;
      --red:    #9b1c2e;
      --green:  #2ecc71;
      --text:   #f0e6d3;
      --muted:  #a08ca0;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── password modal ── */
    #pwd-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    #pwd-overlay.hidden { display: none; }

    .pwd-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .pwd-box .logo { font-size: 2.5rem; margin-bottom: 8px; }
    .pwd-box h2 { color: var(--gold); margin-bottom: 4px; font-size: 1.2rem; }
    .pwd-box p  { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; }

    .pwd-box input {
      width: 100%;
      background: var(--bg2);
      border: 1.5px solid #3d2366;
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 11px 14px;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .pwd-box input:focus { border-color: var(--gold); }

    .pwd-box button {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      border: none;
      border-radius: 50px;
      color: #12071f;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pwd-box button:hover { background: var(--gold-s); }

    .pwd-error {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── main panel ── */
    #panel { display: none; }

    header {
      background: var(--bg2);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2d1b4e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left .logo { font-size: 1.4rem; }
    .header-left h1  { font-size: 1rem; font-weight: 700; color: var(--gold); }
    .header-left .sub { font-size: 0.72rem; color: var(--muted); }

    .header-right { display: flex; align-items: center; gap: 14px; }

    #live-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: var(--muted);
    }
    #live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    #live-dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #live-dot.red    { background: #e74c3c; }

    #queue-count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gold-s);
    }

    /* ── queue ── */
    #queue-wrap {
      padding: 20px 16px;
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── empty state ── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      gap: 12px;
    }
    #empty-state .big { font-size: 3rem; }
    #empty-state p { color: var(--muted); font-size: 0.9rem; }

    /* ── booking card ── */
    .booking-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
      transition: opacity 0.3s, transform 0.3s;
    }
    .booking-card.next {
      border: 1.5px solid var(--gold);
      background: var(--card2);
    }
    .booking-card.removing {
      opacity: 0;
      transform: translateX(40px);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-pos {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--muted);
      min-width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .booking-card.next .card-pos { color: var(--gold); }

    .card-body { flex: 1; min-width: 0; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .card-name { font-weight: 700; font-size: 1rem; }
    .badge-next {
      display: none;
      font-size: 0.62rem;
      font-weight: 800;
      background: var(--gold);
      color: #12071f;
      padding: 2px 7px;
      border-radius: 50px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .booking-card.next .badge-next { display: inline; }

    .card-song { font-size: 0.88rem; color: var(--gold-s); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .card-time {
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
      text-align: right;
    }

    .btn-done {
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--green);
      border: none;
      border-radius: 50px;
      color: #12071f;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-done:hover  { background: #27ae60; }
    .btn-done:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- ── Password overlay ── -->
  <div id="pwd-overlay">
    <div class="pwd-box">
      <div class="logo">🐰</div>
      <h2>Staff Panel</h2>
      <p>Inserisci la password per accedere alla coda</p>
      <input id="pwd-input" type="password" placeholder="••••••••" autocomplete="off" />
      <button id="pwd-btn">Accedi</button>
      <p class="pwd-error" id="pwd-error"></p>
    </div>
  </div>

  <!-- ── Main panel ── -->
  <div id="panel">
    <header>
      <div class="header-left">
        <span class="logo">🐰🎤</span>
        <div>
          <h1>Staff Panel</h1>
          <div class="sub">La Tana del Coniglio · Nola</div>
        </div>
      </div>
      <div class="header-right">
        <div id="live-badge">
          <div id="live-dot"></div>
          <span id="live-label">—</span>
        </div>
        <span id="queue-count"></span>
      </div>
    </header>

    <div id="queue-wrap">
      <div id="empty-state">
        <div class="big">🎉</div>
        <p>Nessuna prenotazione in coda.<br>La serata è libera!</p>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // ── Password gate ────────────────────────────────────────
    const overlay  = document.getElementById('pwd-overlay');
    const pwdInput = document.getElementById('pwd-input');
    const pwdError = document.getElementById('pwd-error');

    if (sessionStorage.getItem('admin_ok') === 'true') unlockPanel();

    document.getElementById('pwd-btn').addEventListener('click', checkPassword);
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

    function checkPassword() {
      if (pwdInput.value === CONFIG.ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_ok', 'true');
        unlockPanel();
      } else {
        pwdError.textContent = 'Password errata.';
        pwdInput.value = '';
        pwdInput.focus();
      }
    }

    function unlockPanel() {
      overlay.classList.add('hidden');
      document.getElementById('panel').style.display = 'block';
      initAdmin();
    }

    // ── Supabase ─────────────────────────────────────────────
    const supabaseReady = CONFIG.SUPABASE_URL && !CONFIG.SUPABASE_URL.includes('TUO-PROGETTO');
    const db = supabaseReady
      ? window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
      : null;

    const liveDot   = document.getElementById('live-dot');
    const liveLabel = document.getElementById('live-label');
    const queueWrap = document.getElementById('queue-wrap');
    const emptyState= document.getElementById('empty-state');
    const queueCount= document.getElementById('queue-count');

    let bookings = [];

    async function initAdmin() {
      if (!db) {
        setLive(false, 'Supabase non configurato');
        renderQueue([]);
        return;
      }
      await loadBookings();
      subscribeRealtime();
    }

    async function loadBookings() {
      const { data, error } = await db
        .from('prenotazioni')
        .select('*')
        .eq('cantata', false)
        .order('created_at', { ascending: true });

      if (error) { console.error(error); return; }
      bookings = data || [];
      renderQueue(bookings);
    }

    function subscribeRealtime() {
      db.channel('prenotazioni-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'prenotazioni' }, loadBookings)
        .subscribe(status => {
          if (status === 'SUBSCRIBED') setLive(true, 'live');
          else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') setLive(false, 'disconnesso');
        });
    }

    function setLive(ok, label) {
      liveDot.className = ok ? 'green' : 'red';
      liveLabel.textContent = label;
    }

    // ── Render ───────────────────────────────────────────────
    function renderQueue(list) {
      // rimuovi le card esistenti (non l'empty-state)
      queueWrap.querySelectorAll('.booking-card').forEach(el => el.remove());

      const pending = list.filter(b => !b.cantata);
      queueCount.textContent = pending.length
        ? `${pending.length} in coda`
        : 'coda vuota';

      if (pending.length === 0) {
        emptyState.style.display = 'flex';
        return;
      }
      emptyState.style.display = 'none';

      pending.forEach((b, i) => {
        queueWrap.insertBefore(makeCard(b, i), emptyState);
      });
    }

    function makeCard(b, index) {
      const card = document.createElement('div');
      card.className = 'booking-card' + (index === 0 ? ' next' : '');
      card.dataset.id = b.id;

      const time = new Date(b.created_at).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

      card.innerHTML = `
        <div class="card-pos">${index + 1}</div>
        <div class="card-body">
          <div class="card-header">
            <span class="card-name">${esc(b.nome)}</span>
            <span class="badge-next">Prossimo</span>
          </div>
          <div class="card-song">🎵 ${esc(b.canzone)}</div>
          <div class="card-meta">${esc(b.artista)} · Tavolo ${b.tavolo}</div>
        </div>
        <div class="card-time">${time}</div>
        <button class="btn-done" data-id="${b.id}">✓ Fatto</button>
      `;

      card.querySelector('.btn-done').addEventListener('click', () => markDone(b.id, card));
      return card;
    }

    async function markDone(id, card) {
      card.querySelector('.btn-done').disabled = true;
      card.classList.add('removing');
      setTimeout(async () => {
        if (db) await db.from('prenotazioni').update({ cantata: true }).eq('id', id);
        // il real-time aggiornerà la lista; se non attivo, carichiamo manualmente
        if (!supabaseReady) loadBookings();
      }, 280);
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
