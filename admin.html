<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Panel – La Tana del Coniglio</title>
  <style>
    :root {
      --bg:     #12071f;
      --bg2:    #1e0f35;
      --card:   #2a1650;
      --card2:  #341a63;
      --gold:   #d4a017;
      --gold-s: #f0c94a;
      --red:    #9b1c2e;
      --green:  #2ecc71;
      --text:   #f0e6d3;
      --muted:  #a08ca0;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #pwd-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    #pwd-overlay.hidden { display: none; }

    .pwd-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 36px 28px;
      width: 100%;
      max-width: 390px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .pwd-box .logo { font-size: 2.5rem; margin-bottom: 8px; }
    .pwd-box h2 { color: var(--gold); margin-bottom: 6px; font-size: 1.2rem; }
    .pwd-box p  { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; line-height: 1.5; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .pwd-box input {
      width: 100%;
      background: var(--bg2);
      border: 1.5px solid #3d2366;
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 11px 14px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .pwd-box input:focus { border-color: var(--gold); }

    .pwd-box button {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      border: none;
      border-radius: 50px;
      color: #12071f;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pwd-box button:hover { background: var(--gold-s); }

    .pwd-error {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 18px;
    }

    #panel { display: none; }

    header {
      background: var(--bg2);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2d1b4e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left .logo { font-size: 1.4rem; }
    .header-left h1  { font-size: 1rem; font-weight: 700; color: var(--gold); }
    .header-left .sub { font-size: 0.72rem; color: var(--muted); }

    .header-right { display: flex; align-items: center; gap: 14px; }

    .header-tools {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #live-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: var(--muted);
    }
    #live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    #live-dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #live-dot.gray   { background: #666; box-shadow: none; }
    #live-dot.red    { background: #e74c3c; }

    #queue-count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gold-s);
    }

    .settings-link,
    .logout-btn {
      border: 1px solid #3d2366;
      background: rgba(255,255,255,0.06);
      color: var(--gold);
      border-radius: 999px;
      font-size: 0.75rem;
      text-decoration: none;
      padding: 7px 11px;
      cursor: pointer;
    }

    #serata-wrap {
      padding: 16px 16px 0;
      max-width: 560px;
      margin: 0 auto;
    }

    .serata-card {
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .serata-card.serata-open  { background: rgba(46,204,113,0.12); border: 1.5px solid var(--green); }
    .serata-card.serata-closed { background: var(--card); border: 1.5px solid #3d2366; }

    .serata-info .serata-status { font-weight: 700; font-size: 0.9rem; }
    .serata-info .serata-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .serata-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-serata {
      padding: 8px 16px;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-open  { background: var(--green); color: #12071f; }
    .btn-close { background: var(--red); color: #fff; }
    .btn-voto-open  { background: var(--gold); color: #12071f; }
    .btn-voto-close { background: #555; color: #fff; }
    .btn-winner { background: #ff6b6b; color: #12071f; }
    .btn-secondary { background: #4b356f; color: #fff; }

    .serata-voto-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .voto-label { font-size: 0.8rem; color: var(--muted); }
    .vota-link {
      font-size: 0.75rem;
      color: var(--gold);
      text-decoration: none;
      margin-top: 2px;
      display: inline-block;
    }

    #queue-wrap {
      padding: 20px 16px;
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .queue-tabs { display: flex; gap: 8px; margin-bottom: 4px; }
    .queue-tab {
      border: 1px solid rgba(255,255,255,0.14);
      background: #1d1430;
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }
    .queue-tab.active { background: var(--gold); color: #12071f; border-color: transparent; }

    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      gap: 12px;
    }
    #empty-state .big { font-size: 3rem; }
    #empty-state p { color: var(--muted); font-size: 0.9rem; }

    .booking-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: opacity 0.3s, transform 0.3s;
    }
    .booking-card.next { border: 1.5px solid var(--gold); background: var(--card2); }
    .booking-card.removing { opacity: 0; transform: translateX(40px); }

    .card-pos {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--muted);
      min-width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .booking-card.next .card-pos { color: var(--gold); }

    .card-body { flex: 1; min-width: 0; }
    .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .card-name { font-weight: 700; font-size: 1rem; }
    .card-song { font-size: 0.88rem; color: var(--gold-s); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .card-votes { font-size: 0.72rem; color: var(--gold-s); margin-top: 4px; font-weight: 700; }

    .badge-pending,
    .badge-approved {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.62rem;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 50px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-pending { background: var(--gold-s); color: #12071f; }
    .badge-approved { background: rgba(47, 198, 108, 0.2); color: #89f2b7; }

    .card-side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .card-time { font-size: 0.72rem; color: var(--muted); text-align: right; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    .btn-action {
      padding: 8px 14px;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-approve { background: var(--gold); color: #12071f; }
    .btn-done { background: var(--green); color: #12071f; }
    .btn-delete { background: var(--red); color: #fff; }

    @media (max-width: 620px) {
      header { align-items: flex-start; }
      .header-right { flex-direction: column; align-items: flex-end; }
      .booking-card { flex-wrap: wrap; }
      .card-side { width: 100%; align-items: stretch; }
      .card-time, .card-actions { text-align: left; justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <div id="pwd-overlay">
    <div class="pwd-box">
      <div class="logo">🐰</div>
      <h2>Staff Panel</h2>
      <p>Inserisci la password admin per entrare nel pannello staff.</p>
      <label class="sr-only" for="pwd-input">Password amministratore</label>
      <input id="pwd-input" type="password" placeholder="password admin" autocomplete="current-password" />
      <button id="pwd-btn">Accedi</button>
      <p class="pwd-error" id="pwd-error"></p>
    </div>
  </div>

  <div id="panel">
    <header>
      <div class="header-left">
        <span class="logo">🐰🎤</span>
        <div>
          <h1>Staff Panel</h1>
          <div class="sub">La Tana del Coniglio · Nola</div>
        </div>
      </div>
      <div class="header-right">
        <div id="live-badge">
          <div id="live-dot"></div>
          <span id="live-label">—</span>
        </div>
        <div class="header-tools">
          <span id="queue-count"></span>
          <a class="settings-link" href="admin-tools.html" title="Strumenti nascosti" aria-label="Strumenti nascosti">⚙️</a>
          <button class="logout-btn" id="logout-btn" type="button">Disconnetti</button>
        </div>
      </div>
    </header>

    <div id="serata-wrap"></div>

    <div id="queue-wrap">
      <div class="queue-tabs">
        <button class="queue-tab active" id="tab-pending" type="button">Da approvare</button>
        <button class="queue-tab" id="tab-approved" type="button">Approvate</button>
        <button class="queue-tab" id="tab-completed" type="button">Concluse</button>
      </div>
      <div id="empty-state">
        <div class="big">🎉</div>
        <p id="empty-state-text">Nessuna prenotazione in coda.<br>La serata è libera!</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script>
    const config =
      (typeof window.CONFIG === 'object' && window.CONFIG)
      || (typeof CONFIG === 'object' && CONFIG)
      || {};
    const supabaseUrl = `${config.SUPABASE_URL || ''}`;
    const supabaseReady = !!supabaseUrl && !supabaseUrl.includes('TUO-PROGETTO');
    const edgeBaseUrl = supabaseReady ? `${supabaseUrl.replace(/\/+$/, '')}/functions/v1` : '';
    const adminBookingsUrl = supabaseReady ? `${edgeBaseUrl}/admin-bookings` : '';

    // Supabase Auth client – sessions persisted in sessionStorage (cleared when tab closes)
    const supabaseClient = supabaseReady
      ? window.supabase.createClient(supabaseUrl, config.SUPABASE_ANON_KEY || '', {
          auth: { persistSession: true, storage: sessionStorage },
        })
      : null;

    const liveDot = document.getElementById('live-dot');
    const liveLabel = document.getElementById('live-label');
    const queueWrap = document.getElementById('queue-wrap');
    const emptyState = document.getElementById('empty-state');
    const emptyStateText = document.getElementById('empty-state-text');
    const queueCount = document.getElementById('queue-count');
    const serataWrap = document.getElementById('serata-wrap');
    const tabPending = document.getElementById('tab-pending');
    const tabApproved = document.getElementById('tab-approved');
    const tabCompleted = document.getElementById('tab-completed');
    const logoutBtn = document.getElementById('logout-btn');

    const overlay = document.getElementById('pwd-overlay');
    const panel = document.getElementById('panel');
    const pwdInput = document.getElementById('pwd-input');
    const pwdError = document.getElementById('pwd-error');
    const pwdBtn = document.getElementById('pwd-btn');

    const ADMIN_EMAIL = 'admin@tana.it';

    let bookings = [];
    let currentSerata = null;
    let syncConnected = false;
    let activeQueueTab = 'pending';
    let adminToken = '';
    let pollingTimer = null;

    document.getElementById('pwd-btn').addEventListener('click', loginAdmin);
    pwdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginAdmin(); });
    logoutBtn.addEventListener('click', logoutAdmin);

    tabPending.addEventListener('click', () => {
      activeQueueTab = 'pending';
      renderQueue(bookings);
    });
    tabApproved.addEventListener('click', () => {
      activeQueueTab = 'approved';
      renderQueue(bookings);
    });
    tabCompleted.addEventListener('click', () => {
      activeQueueTab = 'completed';
      renderQueue(bookings);
    });

    if (supabaseClient) {
      supabaseClient.auth.getSession().then(({ data }) => {
        if (data.session?.access_token) {
          adminToken = data.session.access_token;
          unlockPanel();
        }
      }).catch(() => {});
    }

    function getAdminHeaders(token) {
      const headers = new Headers({ 'Content-Type': 'application/json', Authorization: `Bearer ${token}` });
      if (config.SUPABASE_ANON_KEY) {
        headers.set('apikey', config.SUPABASE_ANON_KEY);
      }
      return headers;
    }

    async function callAdminRaw(token, action, payload = {}) {
      if (!adminBookingsUrl) {
        throw new Error('CONFIG.SUPABASE_URL non configurato.');
      }

      const response = await fetch(adminBookingsUrl, {
        method: 'POST',
        headers: getAdminHeaders(token),
        body: JSON.stringify({ action, ...payload }),
      });

      let result = null;
      try {
        result = await response.json();
      } catch (_) {
        result = null;
      }

      if (!response.ok || !result?.success) {
        const message = result?.error?.message || 'Errore durante la richiesta admin.';
        throw new Error(message);
      }

      return result.data;
    }

    async function callAdmin(action, payload = {}) {
      if (!adminToken) {
        throw new Error('Sessione admin mancante.');
      }
      return await callAdminRaw(adminToken, action, payload);
    }

    async function loginAdmin() {
      const password = pwdInput.value;
      if (!password) {
        pwdError.textContent = 'Inserisci la password admin.';
        return;
      }

      pwdBtn.disabled = true;
      pwdBtn.textContent = 'Verifica in corso…';
      pwdError.textContent = '';

      try {
        if (!supabaseClient) {
          throw new Error('Configurazione Supabase mancante.');
        }
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email: ADMIN_EMAIL, password });
        if (error) throw error;

        const token = data.session?.access_token;
        if (!token) throw new Error('Sessione non ricevuta.');

        adminToken = token;
        pwdInput.value = '';
        unlockPanel();
      } catch (error) {
        pwdError.textContent = error?.message || 'Credenziali non valide.';
      } finally {
        pwdBtn.disabled = false;
        pwdBtn.textContent = 'Accedi';
      }
    }

    function logoutAdmin() {
      if (supabaseClient) supabaseClient.auth.signOut().catch(() => {});
      adminToken = '';
      if (pollingTimer) {
        clearInterval(pollingTimer);
        pollingTimer = null;
      }
      overlay.classList.remove('hidden');
      panel.style.display = 'none';
      pwdInput.value = '';
      pwdError.textContent = '';
      pwdInput.focus();
    }

    function unlockPanel() {
      overlay.classList.add('hidden');
      panel.style.display = 'block';
      initAdmin();
    }

    async function initAdmin() {
      await refreshState();
      if (!pollingTimer) {
        pollingTimer = setInterval(() => {
          refreshState(true);
        }, 12000);
      }
    }

    async function refreshState(silent = false) {
      try {
        const state = await callAdmin('get_state');
        currentSerata = state?.serata || null;
        bookings = Array.isArray(state?.bookings) ? state.bookings : [];
        syncConnected = true;
        renderSerata();
        renderQueue(bookings);
        updateLiveDot();
      } catch (error) {
        syncConnected = false;
        updateLiveDot();
        if (!silent) {
          alert(error?.message || 'Errore durante il caricamento del pannello admin.');
        }
      }
    }

    function updateLiveDot() {
      if (!currentSerata) {
        liveDot.className = 'gray';
        liveLabel.textContent = 'Offline';
      } else if (syncConnected) {
        liveDot.className = 'green';
        liveLabel.textContent = 'Live';
      } else {
        liveDot.className = 'red';
        liveLabel.textContent = 'Offline';
      }
    }

    function renderSerata() {
      if (!currentSerata) {
        serataWrap.innerHTML = `
          <div class="serata-card serata-closed">
            <div class="serata-info">
              <div class="serata-status">⭕ Nessun karaoke aperto</div>
              <div class="serata-sub">Le prenotazioni sono disabilitate</div>
            </div>
            <div class="serata-actions">
              <button class="btn-serata btn-open" id="btn-open-serata">Apri karaoke</button>
            </div>
          </div>
        `;
        document.getElementById('btn-open-serata').addEventListener('click', openSerata);
        return;
      }

      const [year, month, day] = String(currentSerata.data).split('-').map(Number);
      const dateStr = new Date(Date.UTC(year, month - 1, day)).toLocaleDateString('it-IT', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        timeZone: 'UTC',
      });
      const votoOpen = Boolean(currentSerata.voto_aperto);
      const showTotals = Boolean(currentSerata.mostra_voti_totali);
      const winnerDecreed = Boolean(currentSerata.vincitore_decretato);

      serataWrap.innerHTML = `
        <div class="serata-card serata-open">
          <div class="serata-info">
            <div class="serata-status">🟢 Karaoke aperto</div>
            <div class="serata-sub">${dateStr}</div>
          </div>
          <div class="serata-actions">
            <button class="btn-serata btn-close" id="btn-close-serata">Chiudi karaoke</button>
          </div>
          <div class="serata-voto-row">
            <div>
              <div class="voto-label">Votazioni: ${winnerDecreed ? '🏁 concluse con vincitore' : (votoOpen ? '🟢 aperte' : '⭕ chiuse')}</div>
              <a class="vota-link" href="vota.html" target="_blank">Apri pagina voti ↗</a>
              <div class="voto-label">Totali pubblici: ${showTotals ? '👁️ visibili' : '🙈 nascosti'}</div>
            </div>
            <div class="serata-actions">
              ${winnerDecreed ? '' : `
                <button class="btn-serata ${votoOpen ? 'btn-voto-close' : 'btn-voto-open'}" id="btn-toggle-voto">
                  ${votoOpen ? 'Chiudi votazioni' : 'Apri votazioni'}
                </button>
                <button class="btn-serata btn-secondary" id="btn-toggle-show-totals">
                  ${showTotals ? 'Nascondi totali pubblici' : 'Mostra totali pubblici'}
                </button>
                <button class="btn-serata btn-winner" id="btn-decree-winner">Decreta vincitore</button>
              `}
            </div>
          </div>
        </div>
      `;

      document.getElementById('btn-close-serata').addEventListener('click', closeSerata);
      if (!winnerDecreed) {
        document.getElementById('btn-toggle-voto').addEventListener('click', toggleVoto);
        document.getElementById('btn-toggle-show-totals').addEventListener('click', toggleShowVoteTotals);
        document.getElementById('btn-decree-winner').addEventListener('click', decreeWinner);
      }
    }

    async function openSerata() {
      const btn = document.getElementById('btn-open-serata');
      if (!btn) return;
      btn.disabled = true;
      try {
        const data = await callAdmin('open_serata', { date: new Date().toISOString().slice(0, 10) });
        currentSerata = data;
        bookings = [];
        syncConnected = true;
        renderSerata();
        renderQueue(bookings);
        updateLiveDot();
      } catch (error) {
        alert(error?.message || 'Non sono riuscito ad aprire la serata.');
        btn.disabled = false;
      }
    }

    async function closeSerata() {
      if (!currentSerata) return;
      if (!confirm('Chiudere il karaoke? Le prenotazioni verranno disabilitate.')) return;
      const btn = document.getElementById('btn-close-serata');
      if (btn) btn.disabled = true;
      try {
        await callAdmin('close_serata', { serataId: currentSerata.id });
        currentSerata = null;
        bookings = [];
        syncConnected = true;
        renderSerata();
        renderQueue(bookings);
        updateLiveDot();
      } catch (error) {
        alert(error?.message || 'Non sono riuscito a chiudere la serata.');
        if (btn) btn.disabled = false;
      }
    }

    async function toggleVoto() {
      if (!currentSerata) return;
      const btn = document.getElementById('btn-toggle-voto');
      if (btn) btn.disabled = true;
      const nextValue = !Boolean(currentSerata.voto_aperto);

      try {
        const updated = await callAdmin('set_voting', {
          serataId: currentSerata.id,
          votoAperto: nextValue,
        });
        currentSerata = updated;
        syncConnected = true;
        renderSerata();
        updateLiveDot();
      } catch (error) {
        alert(error?.message || 'Non sono riuscito ad aggiornare le votazioni.');
        if (btn) btn.disabled = false;
      }
    }

    async function toggleShowVoteTotals() {
      if (!currentSerata) return;
      const btn = document.getElementById('btn-toggle-show-totals');
      if (btn) btn.disabled = true;
      const nextValue = !Boolean(currentSerata.mostra_voti_totali);
      try {
        const updated = await callAdmin('set_show_vote_totals', {
          serataId: currentSerata.id,
          mostraVotiTotali: nextValue,
        });
        currentSerata = updated;
        syncConnected = true;
        renderSerata();
        updateLiveDot();
      } catch (error) {
        alert(error?.message || 'Non sono riuscito ad aggiornare la visibilità dei voti.');
        if (btn) btn.disabled = false;
      }
    }

    async function decreeWinner() {
      if (!currentSerata) return;
      if (!confirm('Conferma il decreto del vincitore. Dopo questa azione non sarà più possibile prenotare o modificare la coda.')) return;
      const btn = document.getElementById('btn-decree-winner');
      if (btn) btn.disabled = true;
      try {
        const result = await callAdmin('decree_winner', { serataId: currentSerata.id });
        currentSerata = result?.serata || currentSerata;
        syncConnected = true;
        await refreshState(true);
        alert('Vincitore decretato. Da ora puoi solo chiudere il karaoke.');
      } catch (error) {
        alert(error?.message || 'Non sono riuscito a decretare il vincitore.');
        if (btn) btn.disabled = false;
      }
    }

    function renderQueue(list) {
      queueWrap.querySelectorAll('.booking-card').forEach((el) => el.remove());
      const winnerDecreed = Boolean(currentSerata?.vincitore_decretato);

      const toApprove = list.filter((b) => !b.cantata && !b.approvata);
      const approved = list.filter((b) => !b.cantata && b.approvata);
      const completed = list.filter((b) => b.cantata);
      const countParts = [];

      if (approved.length) countParts.push(`${approved.length} in coda`);
      if (toApprove.length) countParts.push(`${toApprove.length} da approvare`);
      if (completed.length) countParts.push(`${completed.length} concluse`);
      queueCount.textContent = countParts.length ? countParts.join(' · ') : 'coda vuota';

      tabPending.textContent = `Da approvare (${toApprove.length})`;
      tabApproved.textContent = `Approvate (${approved.length})`;
      tabCompleted.textContent = `Concluse (${completed.length})`;
      tabPending.classList.toggle('active', activeQueueTab === 'pending');
      tabApproved.classList.toggle('active', activeQueueTab === 'approved');
      tabCompleted.classList.toggle('active', activeQueueTab === 'completed');

      const visibleList = activeQueueTab === 'pending'
        ? toApprove
        : (activeQueueTab === 'approved' ? approved : completed);
      if (!visibleList.length) {
        emptyStateText.innerHTML = activeQueueTab === 'pending'
          ? 'Nessuna prenotazione da approvare.<br>Ottimo lavoro!'
          : (activeQueueTab === 'approved'
            ? 'Nessuna prenotazione approvata.<br>Appariranno qui dopo l’approvazione.'
            : 'Nessuna canzone conclusa.<br>Le esibizioni completate appariranno qui.');
        emptyState.style.display = 'flex';
        return;
      }

      emptyState.style.display = 'none';
      visibleList.forEach((booking, index) => {
        queueWrap.insertBefore(makeCard(booking, index, activeQueueTab, winnerDecreed), emptyState);
      });
    }

    function makeCard(booking, index, kind, lockedAfterWinner = false) {
      const card = document.createElement('div');
      const isApproved = kind === 'approved';
      const isCompleted = kind === 'completed';
      card.className = `booking-card${isApproved && index === 0 ? ' next' : ''}`;
      card.dataset.id = booking.id;

      const time = new Date(booking.created_at).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

      const total = Number(booking.score_total) || 0;
      const count = Number(booking.score_count) || 0;
      const avg = Number(booking.score_average) || 0;
      const scoreText = count > 0 ? `${total} pt · media ${avg.toFixed(2)} · ${count} vot${count === 1 ? 'o' : 'i'}` : 'Nessun voto';

      card.innerHTML = `
        <div class="card-pos">${index + 1}</div>
        <div class="card-body">
          <div class="card-header">
            <span class="card-name">${esc(booking.nome)}</span>
            ${isCompleted
              ? '<span class="badge-approved">🎤 Conclusa</span>'
              : (isApproved ? '<span class="badge-approved">✅ Approvata</span>' : '<span class="badge-pending">Da approvare</span>')}
          </div>
              <div class="card-song">🎵 ${esc(booking.canzone)}</div>
              <div class="card-meta">${esc(booking.artista)}</div>
              <div class="card-votes">🗳 ${scoreText}</div>
            </div>
            <div class="card-side">
              <div class="card-time">${time}</div>
              <div class="card-actions">
                ${lockedAfterWinner
                  ? ''
                  : (isCompleted
                    ? ''
                    : (isApproved ? '<button class="btn-action btn-done" data-action="done">✓ Fatto</button>' : '<button class="btn-action btn-approve" data-action="approve">Approva</button>'))}
                ${lockedAfterWinner ? '' : '<button class="btn-action btn-delete" data-action="delete">Elimina</button>'}
              </div>
            </div>
      `;

      const approveBtn = card.querySelector('[data-action="approve"]');
      const doneBtn = card.querySelector('[data-action="done"]');
      const deleteBtn = card.querySelector('[data-action="delete"]');

      if (approveBtn) approveBtn.addEventListener('click', () => approveBooking(booking.id, card));
      if (doneBtn) doneBtn.addEventListener('click', () => markDone(booking.id, card));
      if (deleteBtn) deleteBtn.addEventListener('click', () => deleteBooking(booking, card));

      return card;
    }

    async function approveBooking(id, card) {
      setCardBusy(card, true);
      try {
        await callAdmin('approve_booking', { bookingId: id });
        bookings = bookings.map((item) => item.id === id ? { ...item, approvata: true } : item);
        renderQueue(bookings);
      } catch (error) {
        restoreCardAfterError(card, error?.message || 'Non sono riuscito ad approvare la prenotazione.');
      }
    }

    async function markDone(id, card) {
      setCardBusy(card, true);
      card.classList.add('removing');
      setTimeout(async () => {
        try {
          await callAdmin('mark_done', { bookingId: id });
          bookings = bookings.map((item) => item.id === id ? { ...item, cantata: true } : item);
          renderQueue(bookings);
        } catch (error) {
          restoreCardAfterError(card, error?.message || 'Non sono riuscito a segnare la prenotazione come completata.');
        }
      }, 280);
    }

    async function deleteBooking(booking, card) {
      if (!confirm(`Eliminare la prenotazione di ${booking.nome} per "${booking.canzone}"?`)) return;
      setCardBusy(card, true);
      card.classList.add('removing');
      setTimeout(async () => {
        try {
          await callAdmin('delete_booking', { bookingId: booking.id });
          bookings = bookings.filter((item) => item.id !== booking.id);
          renderQueue(bookings);
        } catch (error) {
          restoreCardAfterError(card, error?.message || 'Non sono riuscito a eliminare la prenotazione.');
        }
      }, 280);
    }

    function setCardBusy(card, busy) {
      card.querySelectorAll('.btn-action').forEach((btn) => {
        btn.disabled = busy;
      });
    }

    function restoreCardAfterError(card, message) {
      if (document.body.contains(card)) {
        card.classList.remove('removing');
        setCardBusy(card, false);
      }
      alert(message);
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }
  </script>
</body>
</html>
