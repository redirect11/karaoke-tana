name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          IG_USERNAME:        ${{ secrets.IG_USERNAME }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
          SUBMIT_BOOKING_FUNCTION_URL: ${{ secrets.SUBMIT_BOOKING_FUNCTION_URL }}
          BOOKING_STATUS_FUNCTION_URL: ${{ secrets.BOOKING_STATUS_FUNCTION_URL }}
          BOOKING_PENDING_EXPIRY_MIN:  ${{ secrets.BOOKING_PENDING_EXPIRY_MIN }}
          BOOKING_COOLDOWN_MIN:  ${{ secrets.BOOKING_COOLDOWN_MIN }}
          ADS_ENABLED: ${{ secrets.ADS_ENABLED }}
          ADS_MODE: ${{ secrets.ADS_MODE }}
          ADS_PROVIDER: ${{ secrets.ADS_PROVIDER }}
          ADSENSE_CLIENT_ID: ${{ secrets.ADSENSE_CLIENT_ID }}
          ADSENSE_BANNER_SLOT: ${{ secrets.ADSENSE_BANNER_SLOT }}
          ADS_REQUIRE_BEFORE_BOOKING: ${{ secrets.ADS_REQUIRE_BEFORE_BOOKING }}
        run: |
          node -e "
          const fs = require('fs');
          const parseBoolean = (value, fallback = false) => {
            if (typeof value !== 'string') return fallback;
            const normalized = value.trim().toLowerCase();
            if (['true', '1', 'yes', 'on'].includes(normalized)) return true;
            if (['false', '0', 'no', 'off'].includes(normalized)) return false;
            return fallback;
          };
          const normalizeFromSet = (value, allowed, fallback) => {
            const normalized = String(value || '').trim().toLowerCase();
            return allowed.includes(normalized) ? normalized : fallback;
          };
          const getPendingExpiryMinutes = (value) => {
            const parsed = parseInt(value || '', 10);
            if (Number.isNaN(parsed) || parsed <= 0) return 30;
            return Math.min(parsed, 60);
          };
          const pendingExpiryMinutes = getPendingExpiryMinutes(
            process.env.BOOKING_PENDING_EXPIRY_MIN || process.env.BOOKING_COOLDOWN_MIN
          );
          const config = {
             IG_USERNAME:           process.env.IG_USERNAME           || 'latanadelconiglio_nola',
             SUPABASE_URL:          process.env.SUPABASE_URL          || '',
             SUPABASE_ANON_KEY:     process.env.SUPABASE_ANON_KEY     || '',
             SUBMIT_BOOKING_FUNCTION_URL: process.env.SUBMIT_BOOKING_FUNCTION_URL || '',
             BOOKING_STATUS_FUNCTION_URL: process.env.BOOKING_STATUS_FUNCTION_URL || '',
             BOOKING_PENDING_EXPIRY_MIN: pendingExpiryMinutes,
             BOOKING_COOLDOWN_MIN:  pendingExpiryMinutes,
             ADS_ENABLED: parseBoolean(process.env.ADS_ENABLED, false),
             ADS_MODE: normalizeFromSet(process.env.ADS_MODE, ['off', 'soft', 'intrusive'], 'off'),
             ADS_PROVIDER: normalizeFromSet(process.env.ADS_PROVIDER, ['none', 'adsense', 'custom'], 'none'),
             ADSENSE_CLIENT_ID: process.env.ADSENSE_CLIENT_ID || '',
             ADSENSE_BANNER_SLOT: process.env.ADSENSE_BANNER_SLOT || '',
             ADS_REQUIRE_BEFORE_BOOKING: parseBoolean(process.env.ADS_REQUIRE_BEFORE_BOOKING, false),
           };
           fs.writeFileSync('config.js', 'const CONFIG = ' + JSON.stringify(config, null, 2) + ';\nif (typeof window !== \'undefined\') { window.CONFIG = CONFIG; }');
           console.log('config.js generato.');
           "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
