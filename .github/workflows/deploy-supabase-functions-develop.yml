name: Deploy Supabase Edge Functions on develop

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions to Supabase test project
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_TEST_PROJECT_REF || 'jiqjklcnplxolyqeklxr' }}
        run: |
          set -euo pipefail

          mapfile -t functions < <(
            find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -printf '%f\n' | sort
          )

          if [ "${#functions[@]}" -eq 0 ]; then
            echo "No Edge Functions found under supabase/functions."
            exit 0
          fi

          for function_name in "${functions[@]}"; do
            if [ ! -f "supabase/functions/${function_name}/index.ts" ] && [ ! -f "supabase/functions/${function_name}/index.js" ]; then
              echo "Skipping ${function_name}: no index.ts or index.js entrypoint found."
              continue
            fi

            echo "Deploying ${function_name} to ${SUPABASE_PROJECT_REF}"
            supabase functions deploy "${function_name}" --project-ref "${SUPABASE_PROJECT_REF}"
          done
