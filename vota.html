<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vota le esibizioni – La Tana del Coniglio</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6652706779509567" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:     #12071f;
      --bg2:    #1e0f35;
      --card:   #2a1650;
      --card2:  #341a63;
      --gold:   #d4a017;
      --gold-s: #f0c94a;
      --red:    #9b1c2e;
      --green:  #2ecc71;
      --text:   #f0e6d3;
      --muted:  #a08ca0;
      --vote-border: 2px;
      --vote-border-overlap: -2px;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 48px;
    }

    header {
      background: var(--bg2);
      padding: 16px 20px;
      text-align: center;
      border-bottom: 1px solid #2d1b4e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .logo { font-size: 1.6rem; }
    header h1 { font-size: 1rem; font-weight: 700; color: var(--gold); }
    header p  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* ── status banner ── */
    #status-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    #status-banner.closed { background: rgba(155,28,46,0.15); color: #e74c3c; display: flex; }
    #status-banner.open   { background: rgba(46,204,113,0.1);  color: var(--green); display: flex; }

    /* ── main content ── */
    #content {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .vote-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    @media (max-width: 840px) {
      .vote-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── empty / loading states ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      gap: 12px;
    }
    .state-box .big { font-size: 3rem; }
    .state-box p { color: var(--muted); font-size: 0.9rem; }

    /* ── song card ── */
    .song-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 56px 24px 22px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
      position: relative;
      overflow: hidden;
      min-height: 208px;
    }

    .song-card-selfie-bg {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 56%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.52;
      filter: blur(1px) saturate(0.8) brightness(0.88);
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.85) 30%, transparent 95%);
              mask-image: linear-gradient(to left, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.85) 30%, transparent 95%);
      z-index: 0;
      transition: opacity 0.2s, filter 0.2s;
    }
    .song-card.has-selfie:hover .song-card-selfie-bg {
      opacity: 0.82;
      filter: blur(0) saturate(1) brightness(1);
    }
    .song-card.has-selfie > *:not(.song-card-selfie-bg):not(.song-index) {
      position: relative;
      z-index: 1;
    }

    .song-index {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      font-size: 0.8rem;
      font-weight: 800;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px) saturate(140%);
      -webkit-backdrop-filter: blur(8px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      z-index: 2;
    }
    .selfie-open-btn {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.46);
      color: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      backdrop-filter: blur(8px) saturate(140%);
      -webkit-backdrop-filter: blur(8px) saturate(140%);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .selfie-open-btn:hover {
      background: rgba(0,0,0,0.65);
      border-color: rgba(255,255,255,0.28);
    }
    .selfie-open-btn:active { transform: scale(0.97); }
    .selfie-open-btn:focus-visible {
      outline: 2px solid var(--gold-s);
      outline-offset: 1px;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .song-header { margin-bottom: 12px; }
    .song-title { font-weight: 700; font-size: 1.1rem; color: var(--gold-s); }
    .song-artist { font-size: 0.85rem; color: var(--muted); margin-top: 3px; }
    .song-singer {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── applause rating ── */
    .rating-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rating-side {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .rating-hands {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      background: rgba(18,7,31,0.28);
      border: 2px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .rating-hands.has-vote {
      background: rgba(212,160,23,0.10);
      border-color: rgba(212,160,23,0.30);
    }

    .btn-vote {
      width: 52px;
      height: 52px;
      border: var(--vote-border) solid transparent;
      border-radius: 12px;
      background: transparent;
      color: inherit;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, filter 0.15s, opacity 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      filter: grayscale(1) opacity(0.55);
    }
    .btn-vote .vote-num {
      font-size: 0.68rem;
      line-height: 1;
      font-weight: 700;
      color: var(--muted);
    }
    .btn-vote:hover {
      background: rgba(212,160,23,0.12);
      filter: grayscale(0.45) opacity(0.9);
    }
    .btn-vote:active { transform: scale(0.93); }
    .btn-vote.lit {
      filter: grayscale(0) opacity(0.85);
      background: rgba(212,160,23,0.10);
    }
    .btn-vote.lit .vote-num {
      color: var(--gold-s);
    }
    .btn-vote.selected {
      border-color: var(--gold);
      background: rgba(212,160,23,0.22);
      filter: none;
      opacity: 1;
      box-shadow: 0 0 14px rgba(212,160,23,0.20);
    }
    .btn-vote.selected .vote-num {
      color: var(--gold-s);
    }
    .btn-vote:focus-visible {
      outline: 2px solid var(--gold-s);
      outline-offset: 1px;
    }
    .btn-vote:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .vote-score {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }
    .vote-score span {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold-s);
    }


    .leaderboard-card {
      background: linear-gradient(160deg, rgba(30,15,53,0.95) 0%, rgba(21,10,37,0.96) 100%);
      border: 1px solid rgba(212,160,23,0.24);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 36px rgba(0,0,0,0.35);
    }
    .leaderboard-header {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .leaderboard-header h2 {
      color: var(--gold-s);
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .leaderboard-header p {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
    }
    .leaderboard-hero {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(212,160,23,0.35);
      min-height: 172px;
      background: linear-gradient(145deg, #2a1650 0%, #1a0e2d 100%);
    }
    .leaderboard-hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.04);
    }
    .leaderboard-hero-bg.placeholder {
      background:
        radial-gradient(circle at 30% 30%, rgba(212,160,23,0.18), transparent 60%),
        radial-gradient(circle at 70% 70%, rgba(140,40,180,0.3), transparent 60%),
        linear-gradient(135deg, #2a1650 0%, #1d1430 100%);
    }
    .leaderboard-hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(14,5,24,0.12) 0%, rgba(14,5,24,0.84) 78%, rgba(14,5,24,0.96) 100%);
    }
    .leaderboard-hero-content {
      position: relative;
      z-index: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 172px;
      gap: 4px;
    }
    .leaderboard-winner-badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      background: linear-gradient(135deg, var(--gold) 0%, #b07a00 100%);
      color: #1a0a00;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .leaderboard-winner-name {
      font-size: clamp(1.1rem, 3.6vw, 1.45rem);
      font-weight: 800;
      color: #fff;
    }
    .leaderboard-winner-song {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.25;
    }
    .leaderboard-winner-points {
      font-size: 0.75rem;
      color: var(--gold-s);
      font-weight: 700;
      text-transform: uppercase;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(42,22,80,0.85);
      border: 1px solid #3d2366;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .leaderboard-item.winner {
      border-color: rgba(212,160,23,0.7);
      background: linear-gradient(135deg, rgba(212,160,23,0.16) 0%, rgba(42,22,80,0.92) 100%);
    }
    .leaderboard-rank {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(212,160,23,0.18);
      color: var(--gold-s);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.76rem;
      font-weight: 800;
    }
    .leaderboard-item.winner .leaderboard-rank {
      background: var(--gold);
      color: #12071f;
    }
    .leaderboard-song {
      flex: 1;
      min-width: 0;
    }
    .leaderboard-song-title {
      font-size: 0.86rem;
      font-weight: 700;
      color: var(--text);
    }
    .leaderboard-song-meta {
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .leaderboard-points {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--gold-s);
      white-space: nowrap;
      text-align: right;
    }

    .photo-modal[hidden] { display: none; }
    .photo-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      background: rgba(5,3,10,0.88);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .photo-modal-panel {
      width: min(100%, 860px);
      max-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .photo-modal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .photo-modal-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .photo-modal-close {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.38);
      color: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .photo-modal-close:focus-visible {
      outline: 2px solid var(--gold-s);
      outline-offset: 1px;
    }
    .photo-modal-image {
      width: 100%;
      max-height: calc(100vh - 110px);
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #090512;
      box-shadow: 0 12px 42px rgba(0,0,0,0.44);
    }

  </style>
  <link rel="stylesheet" href="scripts/vendor/cookieconsent.css" />
</head>
<body>

  <header>
    <div class="logo">🐰🎤</div>
    <h1>Vota le esibizioni</h1>
    <p>La Tana del Coniglio · Nola</p>
  </header>

  <div id="status-banner"></div>

  <div id="content">
    <div class="state-box" id="loading-state">
      <div class="big">⏳</div>
      <p>Caricamento…</p>
    </div>
  </div>
  <div id="photo-modal" class="photo-modal" hidden role="dialog" aria-modal="true" aria-labelledby="photo-modal-title">
    <div class="photo-modal-panel">
      <div class="photo-modal-toolbar">
        <div id="photo-modal-title" class="photo-modal-title">Foto esibizione</div>
        <button id="photo-modal-close" class="photo-modal-close" type="button" aria-label="Chiudi foto">✕</button>
      </div>
      <img id="photo-modal-image" class="photo-modal-image" alt="" loading="lazy" />
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script defer src="scripts/test-banner.js"></script>
  <script>
    const config = window.CONFIG || {};
    const supabaseReady = config.SUPABASE_URL && !config.SUPABASE_URL.includes('TUO-PROGETTO');
    const db = supabaseReady
      ? window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY)
      : null;

    const content       = document.getElementById('content');
    const statusBanner  = document.getElementById('status-banner');
    const photoModal = document.getElementById('photo-modal');
    const photoModalImg = document.getElementById('photo-modal-image');
    const photoModalTitle = document.getElementById('photo-modal-title');
    const photoModalClose = document.getElementById('photo-modal-close');

    let serata       = null;
    let songs        = [];
    let votingOpen   = false;
    let showTotalsPublic = false;
    // localVotes: { [prenotazione_id]: { voto, db_id } }
    const localVotes = JSON.parse(localStorage.getItem('local_votes') || '{}');

    function saveLocalVotes() {
      localStorage.setItem('local_votes', JSON.stringify(localVotes));
    }

    function getLocalVote(songId) {
      return localVotes[String(songId)] || null;
    }

    function setLocalVote(songId, voto, dbId) {
      const key = String(songId);
      const previousDbId = localVotes[key]?.db_id;
      localVotes[key] = { voto };
      if (dbId !== null && dbId !== undefined) localVotes[key].db_id = dbId;
      else if (previousDbId) localVotes[key].db_id = previousDbId;
    }

    // ── Load serata ────────────────────────────────────────────
    async function loadSerata() {
      if (!db) {
        showEmpty('Supabase non configurato.');
        return;
      }
      // Load most recent serata (open or last closed)
      const { data } = await db
        .from('serate')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (!data) {
        showEmpty('Nessuna serata trovata.');
        return;
      }
      serata     = data;
      votingOpen = data.voto_aperto;
      showTotalsPublic = Boolean(data.mostra_voti_totali);
      updateBanner();
      await loadSongs();
      subscribeRealtime();
    }

    function updateBanner() {
      if (votingOpen) {
        statusBanner.className = 'open';
        statusBanner.textContent = '🟢 Votazioni aperte — esprimi il tuo applauso!';
      } else if (serata?.vincitore_decretato) {
        statusBanner.className = 'closed';
        statusBanner.textContent = '🏁 Vincitore decretato — votazioni concluse';
      } else {
        statusBanner.className = 'closed';
        statusBanner.textContent = '⭕ Votazioni chiuse';
      }
    }

    // ── Load songs ─────────────────────────────────────────────
    async function loadSongs() {
      let { data, error } = await db
        .from('prenotazioni')
        .select('id, nome, canzone, artista, created_at, selfie_url')
        .eq('approvata', true)
        .eq('cantata', true)
        .eq('serata_id', serata.id)
        .order('created_at', { ascending: false });

      if (error || !data || data.length === 0) {
        const fallback = await db
          .from('prenotazioni')
          .select('id, nome, canzone, artista, created_at, selfie_url')
          .eq('approvata', true)
          .eq('cantata', true)
          .is('serata_id', null)
          .order('created_at', { ascending: false });
        if (!fallback.error && fallback.data?.length) {
          data = fallback.data;
          error = null;
        } else if (fallback.error) {
          error = fallback.error;
        }
      }

      if (error) { console.error(error); return; }
      songs = data || [];
      setDisplayIndexes(songs);
      await loadScores();
    }

    // ── Load scores ────────────────────────────────────────────
    async function loadScores() {
      if (songs.length === 0) { renderContent(); return; }
      const ids = songs.map(s => s.id);
      const { data } = await db
        .from('voti')
        .select('prenotazione_id, voto')
        .in('prenotazione_id', ids);

      const scores = {};
      (data || []).forEach(v => {
        if (!scores[v.prenotazione_id]) scores[v.prenotazione_id] = { sum: 0, count: 0 };
        scores[v.prenotazione_id].sum   += v.voto;
        scores[v.prenotazione_id].count += 1;
      });

      songs.forEach(s => { s._scores = scores[s.id] || { sum: 0, count: 0 }; });
      renderContent(scores);
    }

    // ── Render ─────────────────────────────────────────────────
    function renderContent() {
      content.innerHTML = '';

      if (songs.length === 0) {
        content.innerHTML = `
          <div class="state-box">
            <div class="big">��</div>
            <p>Nessuna esibizione conclusa ancora.<br>Torna dopo la prima canzone completata!</p>
          </div>
        `;
        return;
      }

      if (serata?.vincitore_decretato) {
        renderFinalLeaderboard();
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'vote-grid';
      songs.forEach((s) => grid.appendChild(makeSongCard(s)));
      content.appendChild(grid);
    }

    function makeSongCard(s) {
      const div = document.createElement('div');
      const selfieUrl = resolveLanUrl(typeof s.selfie_url === 'string' ? s.selfie_url : '');
      const hasSelfie = Boolean(selfieUrl);
      div.className = `song-card${hasSelfie ? ' has-selfie' : ''}`;
      div.dataset.id = s.id;

      const myVote   = getLocalVote(s.id)?.voto || 0;
      const sc       = s._scores || { sum: 0, count: 0 };
      const avg      = sc.count > 0 ? (sc.sum / sc.count).toFixed(1) : '—';
      const scoreBlock = showTotalsPublic
        ? `<div class="vote-score"><span>${avg}</span>${sc.count} vot${sc.count === 1 ? 'o' : 'i'}</div>`
        : `<div class="vote-score"><span>—</span>Voti nascosti</div>`;

      const btns = [1,2,3,4,5].map(v => {
        const classes = ['btn-vote'];
        if (myVote > 0 && v <= myVote) classes.push('lit');
        if (myVote === v) classes.push('selected');
        const tabIndex = myVote > 0 ? (myVote === v ? '0' : '-1') : (v === 1 ? '0' : '-1');
        const dis   = !votingOpen ? ' disabled' : '';
        return `<button class="${classes.join(' ')}"${dis} data-v="${v}" role="radio" aria-label="Vota ${v} su 5" aria-checked="${myVote === v ? 'true' : 'false'}" tabindex="${tabIndex}"><span aria-hidden="true">👏</span><span class="vote-num" aria-hidden="true">${v}</span></button>`;
      }).join('');

      const handsClass = myVote > 0 ? 'rating-hands has-vote' : 'rating-hands';
      const selfieBtn = hasSelfie
        ? `<button class="selfie-open-btn" type="button" aria-label="Apri foto di ${esc(s.nome)}">📷 Foto</button>`
        : '';

      div.innerHTML = `
        ${hasSelfie ? `<div class="song-card-selfie-bg" style="background-image:url('${escapeCssUrl(selfieUrl)}')"></div>` : ''}
        <div class="song-index">#${Number.isInteger(s._displayIndex) ? s._displayIndex : '—'}</div>
        <div class="song-header">
          <div>
            <div class="song-title">${esc(s.canzone)}</div>
            <div class="song-artist">${esc(s.artista)}</div>
            <div class="song-singer">Cantata da ${esc(s.nome)}</div>
          </div>
        </div>
        <div class="rating-row">
          <div class="${handsClass}" role="radiogroup" aria-label="Voto per ${esc(s.canzone)}">${btns}</div>
          <div class="rating-side">
            ${scoreBlock}
            ${selfieBtn}
          </div>
        </div>
      `;

      if (votingOpen) {
        div.querySelectorAll('.btn-vote').forEach(btn => {
          btn.addEventListener('click', () => castVote(s.id, parseInt(btn.dataset.v, 10), div));
        });
      }
      if (hasSelfie) {
        div.querySelector('.selfie-open-btn')?.addEventListener('click', () => {
          openPhotoModal(selfieUrl, `${s.nome} — ${s.canzone}`);
        });
      }
      return div;
    }


    function setDisplayIndexes(list) {
      const chronological = [...list].sort((a, b) => {
        const aTime = Date.parse(String(a?.created_at || ''));
        const bTime = Date.parse(String(b?.created_at || ''));
        if (Number.isFinite(aTime) && Number.isFinite(bTime) && aTime !== bTime) return aTime - bTime;
        return Number(a?.id || 0) - Number(b?.id || 0);
      });
      const idxMap = new Map();
      chronological.forEach((item, idx) => {
        idxMap.set(Number(item.id), idx + 1);
      });
      list.forEach((item) => {
        item._displayIndex = idxMap.get(Number(item.id)) || null;
      });
    }

    function buildRanking() {
      return [...songs]
        .map((song) => {
          const score = song._scores || { sum: 0, count: 0 };
          const avg = score.count > 0 ? score.sum / score.count : 0;
          return { ...song, scoreTotal: score.sum, scoreCount: score.count, scoreAvg: avg };
        })
        .sort((a, b) => {
          if (b.scoreTotal !== a.scoreTotal) return b.scoreTotal - a.scoreTotal;
          if (b.scoreAvg !== a.scoreAvg) return b.scoreAvg - a.scoreAvg;
          if (b.scoreCount !== a.scoreCount) return b.scoreCount - a.scoreCount;
          return String(a.created_at || '').localeCompare(String(b.created_at || ''));
        });
    }

    function renderFinalLeaderboard() {
      const ranking = buildRanking();
      if (!ranking.length) {
        showEmpty('Classifica non disponibile.');
        return;
      }

      const winnerId = Number(serata?.vincitore_prenotazione_id) || Number(ranking[0].id);
      const winner = ranking.find((item) => Number(item.id) === winnerId) || ranking[0];
      const winnerSongLabel = winner?.artista ? `${winner.canzone} — ${winner.artista}` : winner?.canzone || '';
      const winnerSelfieUrl = resolveLanUrl(winner?.selfie_url || '');
      const winnerBgHtml = winnerSelfieUrl
        ? `<div class="leaderboard-hero-bg" style="background-image:url('${escapeCssUrl(winnerSelfieUrl)}')"></div>`
        : '<div class="leaderboard-hero-bg placeholder"></div>';

      const rows = ranking.map((item, index) => {
        const isWinner = Number(item.id) === Number(winner.id);
        return `
          <div class="leaderboard-item${isWinner ? ' winner' : ''}">
            <div class="leaderboard-rank">${index + 1}</div>
            <div class="leaderboard-song">
              <div class="leaderboard-song-title">${esc(item.nome)} ${isWinner ? '👑' : ''}</div>
              <div class="leaderboard-song-meta">${esc(item.canzone)} · ${esc(item.artista || '')}</div>
            </div>
            <div class="leaderboard-points">${item.scoreTotal} pt<br><span style="font-size:0.68rem;color:var(--muted);font-weight:600;">${item.scoreCount} vot${item.scoreCount === 1 ? 'o' : 'i'}</span></div>
          </div>
        `;
      }).join('');

      content.innerHTML = `
        <section class="leaderboard-card">
          <div class="leaderboard-header">
            <h2>🏆 Vincitore e classifica finale</h2>
            <p>Classifica completa della serata.</p>
          </div>
          <div class="leaderboard-list">
            <article class="leaderboard-hero">
              ${winnerBgHtml}
              <div class="leaderboard-hero-gradient"></div>
              <div class="leaderboard-hero-content">
                <span class="leaderboard-winner-badge">🏆 Vincitore</span>
                <div class="leaderboard-winner-name">${esc(winner.nome)}</div>
                <div class="leaderboard-winner-song">${esc(winnerSongLabel)}</div>
                <div class="leaderboard-winner-points">${winner.scoreTotal} pt · ${winner.scoreCount} voti</div>
              </div>
            </article>
            ${rows}
          </div>
        </section>
      `;
    }

    async function castVote(songId, voto, card) {
      card.querySelectorAll('.btn-vote').forEach(b => b.disabled = true);
      const existing = getLocalVote(songId);
      let error;

      if (existing?.db_id) {
        const res = await db.from('voti').update({ voto }).eq('id', existing.db_id);
        error = res.error;
      } else {
        const res = await db.from('voti').insert({ prenotazione_id: songId, voto }).select('id').single();
        error = res.error;
        if (!error) setLocalVote(songId, voto, res.data.id);
      }

      if (error) {
        console.error(error);
        card.querySelectorAll('.btn-vote').forEach(b => b.disabled = false);
        return;
      }

      if (existing?.db_id) setLocalVote(songId, voto, existing.db_id);
      saveLocalVotes();
      setCardVoteSelection(card, voto);

      // refresh scores for this card
      const song = songs.find(s => s.id === songId);
      if (song) {
        const { data } = await db.from('voti').select('voto').eq('prenotazione_id', songId);
        const arr = data || [];
        song._scores = {
          sum:   arr.reduce((a, v) => a + v.voto, 0),
          count: arr.length,
        };
        const fresh = makeSongCard(song);
        card.replaceWith(fresh);
      }
    }

    function setCardVoteSelection(card, voto) {
      card.querySelectorAll('.btn-vote').forEach(btn => {
        const btnVote = Number(btn.dataset.v);
        const isLit      = voto > 0 && btnVote <= voto;
        const isSelected = voto > 0 && btnVote === voto;
        btn.classList.toggle('lit', isLit);
        btn.classList.toggle('selected', isSelected);
        btn.setAttribute('aria-checked', isSelected ? 'true' : 'false');
        btn.tabIndex = voto > 0 ? (isSelected ? 0 : -1) : (btnVote === 1 ? 0 : -1);
      });
      const ratingHands = card.querySelector('.rating-hands');
      if (ratingHands) ratingHands.classList.toggle('has-vote', voto > 0);
    }

    function showEmpty(msg) {
      content.innerHTML = `<div class="state-box"><div class="big">🌙</div><p>${esc(msg)}</p></div>`;
    }

    function openPhotoModal(url, label) {
      if (!photoModal || !photoModalImg || !photoModalTitle) return;
      photoModalImg.src = url;
      photoModalImg.alt = label || 'Foto esibizione';
      photoModalTitle.textContent = label || 'Foto esibizione';
      photoModal.hidden = false;
      document.body.style.overflow = 'hidden';
      photoModalClose?.focus();
    }

    function closePhotoModal() {
      if (!photoModal || !photoModalImg) return;
      photoModal.hidden = true;
      photoModalImg.src = '';
      photoModalImg.alt = '';
      document.body.style.overflow = '';
    }

    photoModalClose?.addEventListener('click', closePhotoModal);
    photoModal?.addEventListener('click', (event) => {
      if (event.target === photoModal) closePhotoModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && photoModal && !photoModal.hidden) closePhotoModal();
    });

    // ── Real-time ──────────────────────────────────────────────
    function subscribeRealtime() {
      db.channel('vota-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'prenotazioni' }, async () => {
          await loadSongs();
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'serate',
          filter: `id=eq.${serata.id}` }, async payload => {
          serata     = payload.new;
          votingOpen = serata.voto_aperto;
          showTotalsPublic = Boolean(serata.mostra_voti_totali);
          updateBanner();
          renderContent();
        })
        .subscribe();
    }

    function resolveLanUrl(url) {
      if (typeof url !== 'string' || !url) return '';
      const host = typeof window !== 'undefined' && window.location && window.location.hostname;
      if (!host || host === 'localhost' || host === '127.0.0.1') return url;
      return url.replace(/^(https?:\/\/)(localhost|127\.0\.0\.1)(:|\/|$)/, `$1${host}$3`);
    }

    function escapeCssUrl(value) {
      return String(value || '')
        .replaceAll('\\', '\\\\')
        .replaceAll('"', '\\"')
        .replaceAll("'", "\\'")
        .replaceAll('(', '\\(')
        .replaceAll(')', '\\)');
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadSerata();
  </script>
  <script defer src="scripts/vendor/cookieconsent.umd.js"></script>
  <script defer src="cookie-consent.js"></script>
</body>
</html>
