<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">La Tana del Coniglio karaoke icon</title>
  <desc id="desc">Circular karaoke icon with transparent background, colorful ring and stylized rabbit mark.</desc>
  <defs>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1f24"/>
      <stop offset="100%" stop-color="#0f1014"/>
    </linearGradient>
    <linearGradient id="textFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ececec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <path id="topArc" d="M 90 256 A 166 166 0 0 1 422 256"/>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="214" fill="none" stroke="#ffd34d" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="305 1040" transform="rotate(140 256 256)"/>
    <circle cx="256" cy="256" r="214" fill="none" stroke="#ff3fa4" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="355 990" transform="rotate(254 256 256)"/>
    <circle cx="256" cy="256" r="214" fill="none" stroke="#ff8b2b" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="180 1165" transform="rotate(34 256 256)"/>
    <circle cx="256" cy="256" r="194" fill="url(#innerGlow)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4"/>
  </g>

  <text font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="1.5" fill="url(#textFill)">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">LA TANA DEL CONIGLIO</textPath>
  </text>

  <g transform="translate(256 305)" fill="#f8f8f8" stroke="#d8d8d8" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M -72 -8 L -44 -138 L -4 -164 L -20 -46 Z"/>
    <path d="M 10 -42 L 30 -166 L 70 -126 L 44 -10 Z"/>
    <path d="M -36 -22 L 2 -46 L 38 -22 L 30 42 L -28 42 Z" fill="#ffffff"/>
    <path d="M -88 46 L -36 -22 L -28 42 L -72 90 Z" fill="#ededed"/>
    <path d="M 38 -22 L 90 46 L 74 90 L 30 42 Z" fill="#ededed"/>
    <path d="M -28 42 L 30 42 L 10 112 L -10 112 Z" fill="#ffffff"/>
    <path d="M -72 90 L -10 112 L 10 112 L 74 90 L 44 138 L -42 138 Z" fill="#f0f0f0"/>
    <path d="M -10 112 L -42 138"/>
    <path d="M 10 112 L 44 138"/>
    <path d="M -2 -46 L -10 112" opacity="0.7"/>
    <path d="M 2 -46 L 10 112" opacity="0.35"/>
  </g>
</svg>
